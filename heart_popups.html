<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🦆 来自可达鸭的心动信号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 40%, #5c1a6b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            position: relative;
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            animation: musicPulse 2s ease-in-out infinite;
        }
        .music-control:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }
        .music-control.paused {
            animation: none;
            opacity: 0.6;
        }
        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,107,157,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,107,157,0.9), 0 0 40px rgba(255,107,157,0.5); }
        }
        .music-control::before {
            content: '🎵';
        }
        .music-control.paused::before {
            content: '🔇';
        }

        /* 漂浮粒子 */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 中心心形 */
        .heart-wrap {
            position: relative;
            animation: heartbeat 1.2s ease-in-out infinite;
            cursor: pointer;
            z-index: 10;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15%      { transform: scale(1.15); }
            30%      { transform: scale(1); }
            45%      { transform: scale(1.1); }
            60%      { transform: scale(1); }
        }
        .heart {
            width: 120px;
            height: 120px;
            background: linear-gradient(180deg, #ff6b9d, #c44569);
            position: relative;
            transform: rotate(-45deg);
            margin: 60px auto;
            box-shadow: 0 0 40px rgba(255, 107, 157, 0.6), 0 0 80px rgba(255, 107, 157, 0.3);
        }
        .heart::before, .heart::after {
            content: '';
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: inherit;
            position: absolute;
        }
        .heart::before { top: -60px; left: 0; }
        .heart::after  { left: 60px; top: 0; }

        /* 标题文字 */
        .main-text {
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
        }
        .main-text h1 {
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 10px;
            animation: fadeInUp 1s ease 0.5s both;
        }
        .main-text p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.75);
            animation: fadeInUp 1s ease 0.8s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 心跳文字循环 */
        .love-phrases {
            margin-top: 30px;
            height: 40px;
            overflow: hidden;
            position: relative;
            animation: fadeInUp 1s ease 1.1s both;
        }
        .phrase {
            color: #ff6b9d;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            height: 40px;
            line-height: 40px;
            animation: phraseCycle 6s ease-in-out infinite;
            text-shadow: 0 0 15px rgba(255,107,157,0.8);
        }
        @keyframes phraseCycle {
            0%, 20%   { opacity: 1; transform: translateY(0); }
            25%, 45%  { opacity: 0; transform: translateY(-40px); }
            50%, 70%  { opacity: 1; transform: translateY(0); }
            75%, 95%  { opacity: 0; transform: translateY(40px); }
            100%      { opacity: 1; transform: translateY(0); }
        }

        /* 按钮 */
        .btn-enter {
            margin-top: 40px;
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
            animation: fadeInUp 1s ease 1.4s both, btnPulse 2s ease-in-out infinite 2.4s;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 10;
            text-decoration: none;
            display: inline-block;
        }
        .btn-enter:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 30px rgba(255, 107, 157, 0.7);
        }
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(255,107,157,0.5); }
            50%      { box-shadow: 0 4px 40px rgba(255,107,157,0.9); }
        }

        /* 底部署名 */
        .signature {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            animation: fadeInUp 1s ease 1.8s both;
        }

        /* 闪光效果 */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1s ease forwards;
        }
        @keyframes sparkleAnim {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .main-text h1 { font-size: 1.5rem !important; }
            .main-text p { font-size: 0.95rem !important; }
            .heart { width: 80px; height: 80px; }
            .heart::before, .heart::after { width: 80px; height: 80px; }
            .heart::before { top: -40px !important; }
            .heart::after { left: 40px !important; }
            .btn-enter { padding: 13px 36px !important; font-size: 1rem !important; }
            .love-phrases { margin-top: 20px !important; }
            .phrase { font-size: 1rem !important; }
            .music-control { width: 45px; height: 45px; font-size: 1.3rem; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <!-- 音乐控制 -->
    <button class="music-control" id="musicBtn" onclick="toggleMusic()" title="点击开关音乐"></button>

    <!-- 背景音乐：邓紫棋 - 唯一 -->
    <audio id="bgMusic" loop>
        <source src="https://music.163.com/song/media/outer/url?id=1907766514.mp3" type="audio/mpeg">
    </audio>

    <div class="main-text">
        <h1>🦆 可达鸭有话想对你说...</h1>
        <p>点一颗心，了解鸭鸭的心意</p>
    </div>

    <div class="heart-wrap" onclick="onHeartClick(event)">
        <div class="heart"></div>
    </div>

    <div class="love-phrases">
        <div class="phrase" id="phraseText">❤️ 可达鸭超喜欢你 ❤️</div>
    </div>

    <a href="target.html" class="btn-enter">💗 开启心动模式</a>

    <div class="signature">Made with 💖 by 可达鸭</div>

    <script>
        // 音乐控制
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.add('paused');
                isPlaying = false;
            } else {
                music.play().catch(e => {
                    // 自动播放被阻止，需要用户交互
                    console.log('点击页面任意位置开启音乐');
                });
                musicBtn.classList.remove('paused');
                isPlaying = true;
            }
        }

        // 首次点击页面任意位置尝试播放（解决浏览器自动播放限制）
        document.addEventListener('click', function initMusic() {
            if (!isPlaying) {
                music.play().then(() => {
                    musicBtn.classList.remove('paused');
                    isPlaying = true;
                }).catch(() => {});
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // 随机漂浮心形粒子
        const colors = ['#ff6b9d','#ff9ec4','#ff4d6d','#ffb3c6','#ff85a2','#ffc2d1'];
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 16 + 8;
            const color = colors[Math.floor(Math.random() * colors.length)];
            p.style.cssText = `
                left: ${Math.random() * 100}vw;
                width: ${size}px;
                height: ${size}px;
                background: ${color};
                animation-duration: ${Math.random() * 4 + 5}s;
                animation-delay: ${Math.random() * 2}s;
                box-shadow: 0 0 ${size}px ${color};
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }
        setInterval(createParticle, 300);
        for (let i = 0; i < 20; i++) setTimeout(createParticle, i * 200);

        // 点击心形时触发闪光
        function onHeartClick(e) {
            const phrases = [
                '❤️ 可达鸭超喜欢你 ❤️',
                '💗 你的名字是亚克力吗 💗',
                '🌸 鸭鸭想你想得睡不着 🌸',
                '🦆 点击右边按钮认识我 🦆',
                '💕 心跳加速中... 💕'
            ];
            document.getElementById('phraseText').textContent = phrases[Math.floor(Math.random() * phrases.length)];
            for (let i = 0; i < 12; i++) createSparkle(e.clientX, e.clientY);
        }

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = (x + (Math.random()-0.5)*80) + 'px';
            s.style.top  = (y + (Math.random()-0.5)*80) + 'px';
            s.style.animationDuration = (Math.random()*0.5+0.5) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }
    </script>
</body>
</html>
