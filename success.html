<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #000005;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(20,10,60,0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(10,20,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(30,5,50,0.3) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* ── 旋转星空容器 ── */
        .star-sky {
            position: fixed;
            width: 200vw;
            height: 200vh;
            left: 50%;
            top: 100%;
            transform-origin: 50% 0%;
            pointer-events: none;
            animation: skyRotate 60s linear infinite;
        }
        @keyframes skyRotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to   { transform: translateX(-50%) rotate(360deg); }
        }

        /* ── 星星 ── */
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            pointer-events: all;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        .star:hover { filter: brightness(1.5); }

        @keyframes twinkle {
            0%   { opacity: 0;   transform: scale(0.5); }
            15%  { opacity: 1;   transform: scale(1.6); }
            30%  { opacity: 0.7; transform: scale(1.1); }
            50%  { opacity: 0;   transform: scale(0.4); }
            65%  { opacity: 1;   transform: scale(1.5); }
            80%  { opacity: 0.3; transform: scale(1.0); }
            100% { opacity: 0;   transform: scale(0.5); }
        }

        /* ── 星星点击气泡 ── */
        .star-label {
            position: fixed;
            background: rgba(255,255,255,0.95);
            color: #1a1a3e;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            transform: translate(-50%, -130%);
            box-shadow: 0 2px 12px rgba(100,100,255,0.3);
            animation: labelPop 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .star-label::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
        }
        @keyframes labelPop {
            0%   { opacity: 0; transform: translate(-50%, -130%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -130%) scale(1); }
        }

        /* ── 流星 ── */
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
            border-radius: 2px;
            animation: shoot linear forwards;
            opacity: 0;
        }
        @keyframes shoot {
            0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            5%   { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }

        /* ── 主文字区域 ── */
        .main-text {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease 0.5s both;
            width: 100%;
            max-width: 700px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .days-text {
            font-size: clamp(1.6rem, 5vw, 3.8rem);
            font-weight: 300;
            letter-spacing: clamp(2px, 1vw, 6px);
            line-height: 1.4;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            word-break: keep-all;
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .sub-text {
            margin-top: 16px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
        }

        .hearts {
            margin-top: clamp(20px, 4vh, 40px);
            font-size: clamp(2rem, 6vw, 3.5rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            line-height: 1;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.12); }
        }

        /* ── 音乐按钮 ── */
        .music-control {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.5; }

        /* ── 导航按钮 ── */
        .nav-btn {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom, 20px));
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.75);
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
            white-space: nowrap;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
        .nav-prev { left: max(15px, env(safe-area-inset-left, 15px)); }
        .nav-next { right: max(15px, env(safe-area-inset-right, 15px)); }

        /* ── 响应式 ── */
        @media (max-width: 480px) {
            .days-text { letter-spacing: 1px; }
            .nav-btn { padding: 9px 16px; }
        }
        @media (min-width: 1200px) {
            .days-text { font-size: 4rem; }
            .hearts { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <!-- 音乐 -->
    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>
    <audio id="bgMusic" loop preload="auto"
           src="https://music.163.com/song/media/outer/url?id=32507037.mp3"></audio>

    <!-- 星空 -->
    <div class="star-sky" id="starSky"></div>

    <!-- 主文字 -->
    <div class="main-text">
        <div class="days-text" id="daysText">亚克力与可达鸭已经92天</div>
        <div class="sub-text" id="dateText"></div>
        <div class="hearts">🦆 ❤️</div>
    </div>

    <!-- 导航 -->
    <a href="target.html"      class="nav-btn nav-prev">← 表白</a>
    <a href="heart_popups.html" class="nav-btn nav-next">首页 →</a>

    <script>
        /* ══════════════════════════════════════════
           音乐（逃跑计划 - 夜空中最亮的星）
        ══════════════════════════════════════════ */
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic  = document.getElementById('bgMusic');
        let musicStarted = false;
        let isPaused = false;

        function tryPlay() { bgMusic.play().catch(() => {}); }

        function toggleMusic() {
            if (!musicStarted) {
                tryPlay();
                musicStarted = true;
                isPaused = false;
                musicBtn.classList.remove('paused');
            } else {
                isPaused = !isPaused;
                isPaused ? bgMusic.pause() : tryPlay();
                musicBtn.classList.toggle('paused', isPaused);
            }
        }

        // 首次点击页面自动播放
        document.addEventListener('click', function initMusic() {
            if (!musicStarted) { tryPlay(); musicStarted = true; }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // 页面加载完延迟自动播放（提升触发概率）
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!musicStarted) { tryPlay(); musicStarted = true; }
            }, 800);
        });

        /* ══════════════════════════════════════════
           天数计算
           基准：2026-04-16 = 第92天
        ══════════════════════════════════════════ */
        const BASE_DATE = new Date('2026-04-16T00:00:00+08:00');
        const BASE_DAYS  = 92;

        function calcDays() {
            const now = new Date();
            const bjNow = new Date(now.getTime() + (480 + now.getTimezoneOffset()) * 60000);
            bjNow.setHours(0, 0, 0, 0);
            const base = new Date(BASE_DATE);
            base.setHours(0, 0, 0, 0);
            return BASE_DAYS + Math.floor((bjNow - base) / 86400000);
        }

        function formatDate(d) {
            return d.getFullYear() + '.' +
                String(d.getMonth() + 1).padStart(2, '0') + '.' +
                String(d.getDate()).padStart(2, '0');
        }

        function updateDisplay() {
            const days = calcDays();
            document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + days + '天';
            const now = new Date();
            document.getElementById('dateText').textContent = formatDate(now);
        }

        updateDisplay();
        setInterval(updateDisplay, 60000);

        /* ══════════════════════════════════════════
           星星日期系统
           2026-01-14 = 第1颗星 …… today = 第N颗星
        ══════════════════════════════════════════ */
        const STAR_START = new Date('2026-01-14T00:00:00+08:00');
        const today2 = new Date();
        const bjToday = new Date(today2.getTime() + (480 + today2.getTimezoneOffset()) * 60000);
        bjToday.setHours(0, 0, 0, 0);

        // 今天对应第几颗星（每过零点 +1）
        const todayStarIndex = Math.floor((bjToday - STAR_START) / 86400000) + 1;
        const extraStars = 30; // 额外装饰星（无日期名）
        const totalStars = todayStarIndex + extraStars;

        // 生成所有星星
        const starSky = document.getElementById('starSky');
        const allStars = [];

        for (let i = 0; i < totalStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            // 尺寸：有日期的星星稍大更明显
            const size = i < todayStarIndex
                ? Math.random() * 3 + 2     // 2~5px（有意义）
                : Math.random() * 2 + 1;    // 1~3px（装饰）

            // 散落在 200vw × 200vh 星空容器内
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const dur   = Math.random() * 4 + 2.5;
            const delay = Math.random() * 8;

            const glow = size * 4;

            // 有日期名的星星有特殊蓝色光晕
            const hasDate = i < todayStarIndex;
            const glowColor = hasDate
                ? `rgba(200,220,255,0.9), 0 0 ${glow*2}px rgba(150,180,255,0.5)`
                : `rgba(255,255,255,0.85), 0 0 ${glow*2}px rgba(180,200,255,0.4)`;

            star.style.cssText = `
                width:${size}px; height:${size}px;
                left:${x}%; top:${y}%;
                --dur:${dur}s; --delay:${delay}s;
                box-shadow: 0 0 ${glow}px ${glow/2}px ${glowColor};
            `;

            // 有日期的星星才绑定点击
            if (hasDate) {
                const starDate = new Date(STAR_START);
                starDate.setDate(starDate.getDate() + i); // 0-based: i=0 → 01-14
                const label = formatDate(starDate);

                star.addEventListener('click', (function(l, sx, sy) {
                    return function(e) {
                        e.stopPropagation();
                        showStarLabel(l, sx, sy);
                    };
                })(label, x, y));
            }

            starSky.appendChild(star);
            allStars.push(star);
        }

        // 点击任意星星弹出日期气泡
        function showStarLabel(text, pctX, pctY) {
            // 先清除旧气泡
            document.querySelectorAll('.star-label').forEach(el => el.remove());

            const label = document.createElement('div');
            label.className = 'star-label';
            label.textContent = text;

            // 气泡定位在星空容器内坐标转屏幕坐标
            // 星空容器 left=50%, top=100%, width=200vw, height=200vh
            // 星空容器左上角屏幕坐标: (50% - 100vw, 100vh)
            // 星星在星空内的百分比 (pctX, pctY) → 屏幕坐标:
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const skyLeft = vw / 2 - vw;      // 星空容器左边缘屏幕x
            const skyTop  = vh;               // 星空容器上边缘屏幕y

            const screenX = skyLeft + (pctX / 100) * vw * 2;
            const screenY = skyTop  + (pctY / 100) * vh * 2;

            label.style.left = screenX + 'px';
            label.style.top  = screenY + 'px';

            document.body.appendChild(label);

            // 3秒后自动消失
            setTimeout(() => {
                label.style.transition = 'opacity 0.4s, transform 0.4s';
                label.style.opacity = '0';
                label.style.transform = 'translate(-50%, -130%) scale(0.7)';
                setTimeout(() => label.remove(), 400);
            }, 2500);

            // 点击气泡本身也可关闭
            label.addEventListener('click', (e) => {
                e.stopPropagation();
                label.remove();
            });
        }

        /* ══════════════════════════════════════════
           流星
        ══════════════════════════════════════════ */
        function createShootingStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            const len = 100 + Math.random() * 150;
            s.style.cssText = `
                left:${20 + Math.random() * 60}%;
                top:${5 + Math.random() * 45}%;
                width:${len}px;
                animation-duration:${0.7 + Math.random() * 0.6}s;
            `;
            starSky.appendChild(s);
            setTimeout(() => s.remove(), 2000);
            setTimeout(createShootingStar, 6000 + Math.random() * 12000);
        }
        for (let i = 0; i < 4; i++) {
            setTimeout(createShootingStar, i * 7000 + Math.random() * 4000);
        }
    </script>
</body>
</html>
