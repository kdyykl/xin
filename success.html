<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #000010 0%, #0a0a2e 50%, #1a0a3e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 旋转星空容器 - 圆心在屏幕底部 */
        .star-sky {
            position: fixed;
            inset: 0;
            pointer-events: none;
            transform-origin: 50% 100%;
            animation: skyRotate 120s linear infinite;
        }
        @keyframes skyRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 星星 - 忽隐忽现效果 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.8); }
            15% { opacity: 1; transform: scale(1.3); }
            30% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0; transform: scale(0.6); }
            65% { opacity: 0.9; transform: scale(1.2); }
            80% { opacity: 0.2; transform: scale(0.9); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(to right, white, transparent);
            animation: shoot linear infinite;
            opacity: 0;
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateX(-300px) translateY(300px); opacity: 0; }
        }

        /* 主文字 */
        .main-text {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 2s ease 0.5s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .days-text {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            background: linear-gradient(135deg, #fff, #ffd700, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hearts {
            margin-top: 30px;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.6; }

        /* 导航按钮 */
        .nav-btn {
            position: fixed;
            bottom: 30px;
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .nav-prev { left: 30px; }
        .nav-next { right: 30px; }

        @media (max-width: 600px) {
            .music-control { width: 45px; height: 45px; top: 15px; right: 15px; }
            .nav-btn { padding: 10px 20px; font-size: 0.85rem; }
            .nav-prev { left: 15px; bottom: 20px; }
            .nav-next { right: 15px; bottom: 20px; }
            .hearts { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <!-- 音乐控制 -->
    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>

    <!-- 网易云iframe播放器 -->
    <iframe id="neteasePlayer" frameborder="no" border="0" marginwidth="0" marginheight="0" width="0" height="0" src="//music.163.com/outchain/player?type=2&id=5252398&auto=1&height=0"></iframe>

    <!-- 星空 -->
    <div class="star-sky" id="starSky"></div>

    <!-- 主文字 -->
    <div class="main-text">
        <div class="days-text" id="daysText">亚克力与可达鸭已经91天</div>
        <div class="hearts">🦆 ❤️</div>
    </div>

    <!-- 导航 -->
    <a href="target.html" class="nav-btn nav-prev">← 表白</a>
    <a href="heart_popups.html" class="nav-btn nav-next">首页 →</a>

    <script>
        // 音乐控制
        const musicBtn = document.getElementById('musicBtn');
        const neteasePlayer = document.getElementById('neteasePlayer');
        let musicStarted = false;

        function toggleMusic() {
            if (!musicStarted) {
                neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=5252398&auto=1&height=66';
                musicStarted = true;
                musicBtn.classList.remove('paused');
            } else {
                neteasePlayer.src = musicBtn.classList.contains('paused') 
                    ? '//music.163.com/outchain/player?type=2&id=5252398&auto=1&height=66'
                    : '//music.163.com/outchain/player?type=2&id=5252398&auto=0&height=0';
                musicBtn.classList.toggle('paused');
            }
        }

        // 天数计算（从2026-01-15起，90天后是2026-04-15）
        const startDate = new Date('2026-01-15');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const rawDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
        const daysCount = Math.max(91, rawDays);

        // 显示天数
        document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + daysCount + '天';

        // 生成星星（忽隐忽现效果）
        const starSky = document.getElementById('starSky');
        for (let i = 0; i < daysCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const dur = Math.random() * 4 + 3; // 3-7秒一个完整忽隐忽现周期
            const delay = Math.random() * 7;     // 随机延迟，让星星不同步
            star.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${x}%;
                top: ${y}%;
                --dur: ${dur}s;
                --delay: ${delay}s;
                box-shadow: 0 0 ${size * 3}px rgba(255,255,255,0.6);
            `;
            starSky.appendChild(star);
        }

        // 流星
        for (let i = 0; i < 5; i++) {
            setTimeout(() => createShootingStar(), i * 8000 + Math.random() * 5000);
        }
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.cssText = `
                left: ${30 + Math.random() * 50}%;
                top: ${Math.random() * 50}%;
                width: ${80 + Math.random() * 120}px;
                animation-duration: ${0.8 + Math.random() * 0.6}s;
            `;
            starSky.appendChild(star);
            setTimeout(() => star.remove(), 2000);
            setTimeout(createShootingStar, 5000 + Math.random() * 10000);
        }

        // 首次点击页面自动开启音乐
        document.addEventListener('click', function initMusic() {
            if (!musicStarted) {
                neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=5252398&auto=1&height=66';
                musicStarted = true;
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });
    </script>
</body>
</html>
