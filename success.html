<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #000005;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(20,10,60,0.7) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(10,20,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15,10,50,0.5) 0%, transparent 50%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: white;
        }

        /* ── 星空层：星星直接放 viewport 内，不旋转容器 ── */
        .star-field {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .star-field .star {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
            z-index: calc(100 + var(--star-idx, 0) % 100);
        }

        /* ── 星星：荧光绿萤火虫 ── */
        .star {
            border-radius: 50%;
            background: #39ff14;
            animation: twinkle var(--dur) ease-in-out infinite,
                       fireflyMove var(--flyDur, 15s) ease-in-out infinite;
            animation-delay: var(--delay), var(--flyDelay, 0s);
            transition: left 0.8s cubic-bezier(0.34,1.56,0.64,1),
                        top 0.8s cubic-bezier(0.34,1.56,0.64,1),
                        transform 0.8s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.8s;
            will-change: left, top, transform;
        }
        .star:hover { filter: brightness(1.8); }
        .star.centered {
            animation: none !important;
            z-index: 500;
        }

        @keyframes twinkle {
            0%   { opacity: 0.15; transform: scale(0.6); }
            15%  { opacity: 0.9;  transform: scale(1.4); }
            30%  { opacity: 0.5;  transform: scale(1); }
            50%  { opacity: 0.15; transform: scale(0.5); }
            65%  { opacity: 0.85; transform: scale(1.3); }
            80%  { opacity: 0.3;  transform: scale(0.8); }
            100% { opacity: 0.15; transform: scale(0.6); }
        }
        @keyframes fireflyMove {
            0%   { margin-left: 0;  margin-top: 0; }
            25%  { margin-left: var(--dx1, 30px); margin-top: var(--dy1, -20px); }
            50%  { margin-left: var(--dx2, -20px); margin-top: var(--dy2, 25px); }
            75%  { margin-left: var(--dx3, 15px); margin-top: var(--dy3, -30px); }
            100% { margin-left: 0; margin-top: 0; }
        }

        /* ── 日期气泡（萤火虫风格） ── */
        .star-label {
            position: fixed;
            background: rgba(10,40,5,0.92);
            color: #39ff14;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(57,255,20,0.4);
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            text-align: center;
            box-shadow: 0 0 20px rgba(57,255,20,0.3), 0 2px 16px rgba(0,0,0,0.5);
            animation: labelPop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .star-label::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #39ff14;
            border-radius: 50%;
            box-shadow: 0 0 8px #39ff14;
        }
        @keyframes labelPop {
            0%   { opacity: 0; transform: translate(-50%, -140%) scale(0.4); }
            100% { opacity: 1; transform: translate(-50%, -140%) scale(1); }
        }

        /* ── 流星 ── */
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
            border-radius: 2px;
            animation: shoot linear forwards;
            opacity: 0;
        }
        @keyframes shoot {
            0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            5%   { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }

        /* ── 主文字 ── */
        .main-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 500;
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease 0.5s both;
            width: auto;
            max-width: 95vw;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, calc(-50% + 20px)); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }

        .days-text {
            font-size: clamp(1.4rem, 4.5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: clamp(1px, 0.8vw, 5px);
            line-height: 1.4;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            white-space: nowrap;
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .sub-text {
            margin-top: 14px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
        }

        .hearts {
            margin-top: clamp(20px, 4vh, 40px);
            font-size: clamp(2rem, 6vw, 3.5rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            line-height: 1;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.12); }
        }

        /* ── 音乐按钮 ── */
        .music-control {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.5; }



        @media (max-width: 480px) {
            .days-text { letter-spacing: 1px; font-size: 1.3rem; }
            .main-text { max-width: 98vw; padding: 10px; }
        }
        @media (max-height: 500px) {
            .main-text { top: 45%; }
        }
        @media (min-width: 1200px) {
            .days-text { font-size: 4rem; }
            .hearts { font-size: 3.5rem; }
        }

        /* ── 开场幕布 ── */
        .curtain {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #000008 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .curtain.hide {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        .curtain-stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .curtain-stars::before,
        .curtain-stars::after {
            content: '';
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow:
                10vw 20vh 0 0 rgba(255,255,255,0.8),
                25vw 45vh 0 -1px rgba(255,255,255,0.6),
                40vw 15vh 0 0 rgba(255,255,255,0.7),
                55vw 60vh 0 -1px rgba(255,255,255,0.5),
                70vw 30vh 0 0 rgba(255,255,255,0.8),
                85vw 70vh 0 -1px rgba(255,255,255,0.6),
                15vw 80vh 0 0 rgba(255,255,255,0.7),
                90vw 10vh 0 -1px rgba(255,255,255,0.5),
                5vw 55vh 0 0 rgba(255,255,255,0.6),
                95vw 45vh 0 -1px rgba(255,255,255,0.8),
                30vw 5vh 0 0 rgba(255,255,255,0.7),
                60vw 85vh 0 -1px rgba(255,255,255,0.6),
                20vw 35vh 0 0 rgba(255,255,255,0.5),
                80vw 55vh 0 -1px rgba(255,255,255,0.8),
                45vw 75vh 0 0 rgba(255,255,255,0.7);
            animation: curtainTwinkle 3s ease-in-out infinite;
        }
        .curtain-stars::after {
            animation-delay: 1.5s;
        }
        @keyframes curtainTwinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .curtain-title {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: rgba(255,255,255,0.6);
            letter-spacing: 4px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .start-btn {
            padding: 18px 50px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-family: inherit;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, rgba(255,100,150,0.3), rgba(100,150,255,0.3));
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            animation: glow 2s ease-in-out infinite;
        }
        .start-btn:hover {
            transform: scale(1.08);
            background: linear-gradient(135deg, rgba(255,100,150,0.5), rgba(100,150,255,0.5));
            box-shadow: 0 0 30px rgba(255,150,200,0.5);
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,150,200,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,150,200,0.5); }
        }
    </style>
</head>
<body>

    <!-- 开场幕布 -->
    <div class="curtain" id="curtain">
        <div class="curtain-stars"></div>
        <div class="curtain-title">和你在一起总能遇到萤火虫</div>
        <button class="start-btn" id="startBtn">开始我们的故事</button>
    </div>

    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>
    <audio id="bgMusic" loop preload="auto" src="bgm.mp3"></audio>
    <!-- 网易云 iframe 备用播放器 -->
    <iframe id="neteasePlayer" frameborder="no" border="0" marginwidth="0" marginheight="0" width=1 height=1 style="position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none;" src="//music.163.com/outchain/player?type=2&id=2083785152&auto=0&height=0"></iframe>

    <div class="star-field" id="starField"></div>

    <div class="main-text">
        <div class="days-text" id="daysText">亚克力与可达鸭已经92天</div>
        <div class="sub-text" id="dateText"></div>
        <div class="hearts">🦆 ❤️</div>
    </div>



    <script>
        /* ── 开场幕布 + 音乐 ── */
        const curtain = document.getElementById('curtain');
        const startBtn = document.getElementById('startBtn');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic  = document.getElementById('bgMusic');
        const neteasePlayer = document.getElementById('neteasePlayer');
        let musicStarted = false;
        let isPaused = false;
        let useNetease = false;

        function tryPlayMusic() {
            return bgMusic.play().then(() => {
                useNetease = false;
            }).catch(() => {
                // 本地播放失败 → 用网易云 iframe
                useNetease = true;
                neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=2083785152&auto=1&height=0';
            });
        }

        function toggleMusic() {
            if (isPaused) {
                if (useNetease) {
                    neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=2083785152&auto=1&height=0';
                } else {
                    bgMusic.play();
                }
                musicBtn.classList.remove('paused');
                isPaused = false;
            } else if (musicStarted) {
                if (useNetease) {
                    neteasePlayer.src = 'about:blank';
                } else {
                    bgMusic.pause();
                }
                musicBtn.classList.add('paused');
                isPaused = true;
            } else {
                tryPlayMusic().then(() => {
                    musicStarted = true;
                    isPaused = false;
                    musicBtn.classList.remove('paused');
                });
            }
        }

        // 点击"开始我们的故事"按钮 → 触发音乐
        startBtn.addEventListener('click', function() {
            curtain.classList.add('hide');
            tryPlayMusic().then(() => {
                musicStarted = true;
                isPaused = false;
                musicBtn.classList.remove('paused');
            });
            setTimeout(() => curtain.remove(), 1200);
        }, { once: true });

        /* ── 天数计算 ── */
        const BASE_DATE = new Date('2026-04-16T00:00:00+08:00');
        const BASE_DAYS  = 92;

        function calcDays() {
            const now = new Date();
            const bjNow = new Date(now.getTime() + (480 + now.getTimezoneOffset()) * 60000);
            bjNow.setHours(0, 0, 0, 0);
            const base = new Date(BASE_DATE);
            base.setHours(0, 0, 0, 0);
            return BASE_DAYS + Math.floor((bjNow - base) / 86400000);
        }

        function formatDate(d) {
            return d.getFullYear() + '.' +
                String(d.getMonth() + 1).padStart(2, '0') + '.' +
                String(d.getDate()).padStart(2, '0');
        }

        function updateDisplay() {
            const days = calcDays();
            document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + days + '天';
            const now = new Date();
            document.getElementById('dateText').textContent = formatDate(now);
        }

        updateDisplay();
        setInterval(updateDisplay, 60000);

        /* ── 星星日期系统 ── */
        const STAR_START = new Date('2026-01-14T00:00:00+08:00');
        const today2 = new Date();
        const bjToday = new Date(today2.getTime() + (480 + today2.getTimezoneOffset()) * 60000);
        bjToday.setHours(0, 0, 0, 0);
        const todayStarIndex = Math.floor((bjToday - STAR_START) / 86400000) + 1;
        const extraStars = 30;
        const totalStars = todayStarIndex + extraStars;

        const starField = document.getElementById('starField');
        const STAR_COUNT = totalStars;

        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const hasDate = i < todayStarIndex;

            const size = hasDate
                ? Math.random() * 3 + 2    // 2~5px
                : Math.random() * 2 + 1;    // 1~3px

            // 直接放在 viewport 内，3%~97% 范围内，永不裁剪
            const x = 3 + Math.random() * 94;   // 3~97%
            const y = 3 + Math.random() * 94;   // 3~97%

            const dur   = Math.random() * 4 + 2.5;
            const delay = Math.random() * 8;
            const glow  = size * 4;
            const flyDur = (Math.random() * 12 + 10).toFixed(1);
            const flyDelay = (Math.random() * 8).toFixed(1);
            const dx1 = (Math.random() * 60 - 30).toFixed(0);
            const dy1 = (Math.random() * 60 - 30).toFixed(0);
            const dx2 = (Math.random() * 60 - 30).toFixed(0);
            const dy2 = (Math.random() * 60 - 30).toFixed(0);
            const dx3 = (Math.random() * 60 - 30).toFixed(0);
            const dy3 = (Math.random() * 60 - 30).toFixed(0);

            const glowColor = hasDate
                ? `rgba(57,255,20,0.9), 0 0 ${glow*2}px rgba(57,255,20,0.5)`
                : `rgba(57,255,20,0.7), 0 0 ${glow*2}px rgba(57,255,20,0.3)`;

            star.style.cssText =
                'width:'  + size + 'px;' +
                'height:' + size + 'px;' +
                'left:'   + x.toFixed(2) + '%;' +
                'top:'    + y.toFixed(2) + '%;' +
                '--dur:'  + dur.toFixed(1) + 's;' +
                '--delay:' + delay.toFixed(1) + 's;' +
                '--flyDur:' + flyDur + 's;' +
                '--flyDelay:' + flyDelay + 's;' +
                '--dx1:' + dx1 + 'px;--dy1:' + dy1 + 'px;' +
                '--dx2:' + dx2 + 'px;--dy2:' + dy2 + 'px;' +
                '--dx3:' + dx3 + 'px;--dy3:' + dy3 + 'px;' +
                'box-shadow:0 0 ' + glow + 'px ' + (glow/2) + 'px ' + glowColor + ';';

            if (hasDate) {
                const starDate = new Date(STAR_START);
                starDate.setDate(starDate.getDate() + i);
                const label = formatDate(starDate);

                star.addEventListener('click', (function(l, el) {
                    return function(e) {
                        e.stopPropagation();
                        flyToCenter(l, el);
                    };
                })(label, star));
            }

            starField.appendChild(star);
        }

        let activeLabel = null;

        function flyToCenter(text, starEl) {
            // 移除旧的标签和之前居中的星星
            document.querySelectorAll('.star-label').forEach(el => el.remove());
            document.querySelectorAll('.star.centered').forEach(el => {
                el.classList.remove('centered');
                el.style.transform = '';
                el.style.left = el.dataset.origLeft;
                el.style.top = el.dataset.origTop;
            });

            // 记住原始位置
            starEl.dataset.origLeft = starEl.style.left;
            starEl.dataset.origTop = starEl.style.top;

            // 飞到屏幕中间
            starEl.classList.add('centered');
            starEl.style.left = '50%';
            starEl.style.top = '50%';
            starEl.style.transform = 'translate(-50%, -50%) scale(3)';
            starEl.style.boxShadow = '0 0 40px 15px rgba(57,255,20,0.9), 0 0 80px 30px rgba(57,255,20,0.4)';

            // 显示名字
            const label = document.createElement('div');
            label.className = 'star-label';
            label.textContent = '✨ ' + text;
            label.style.left = '50%';
            label.style.top = '50%';
            label.style.transform = 'translate(-50%, -180%)';
            document.body.appendChild(label);
            activeLabel = label;

            // 点击空白处复原
            setTimeout(() => {
                function reset(e) {
                    if (e && e.target.closest('.star')) return;
                    document.removeEventListener('click', reset);
                    label.style.transition = 'opacity 0.4s';
                    label.style.opacity = '0';
                    setTimeout(() => label.remove(), 400);
                    starEl.classList.remove('centered');
                    starEl.style.transform = '';
                    starEl.style.boxShadow = '';
                    starEl.style.left = starEl.dataset.origLeft;
                    starEl.style.top = starEl.dataset.origTop;
                }
                document.addEventListener('click', reset);
            }, 200);
        }

        /* ── 流星 ── */
        function createShootingStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.cssText =
                'left:' + (20 + Math.random() * 60) + '%;' +
                'top:'  + (5  + Math.random() * 45) + '%;' +
                'width:' + (100 + Math.random() * 150) + 'px;' +
                'animation-duration:' + (0.7 + Math.random() * 0.6) + 's;';
            starField.appendChild(s);
            setTimeout(() => s.remove(), 2000);
            setTimeout(createShootingStar, 6000 + Math.random() * 12000);
        }
        for (let i = 0; i < 5; i++) {
            setTimeout(createShootingStar, i * 6000 + Math.random() * 3000);
        }

        /* ── 调试信息（临时）: 打印星星数量 ── */
        console.log('星星总数:', STAR_COUNT, '  有日期的:', todayStarIndex);
    </script>
</body>
</html>
