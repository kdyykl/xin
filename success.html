<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>✨ 夜空中最亮的星</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #000008 0%, #0a0a1a 50%, #0f0f2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 旋转星空 - 速度加快 */
        .star-sky {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            pointer-events: none;
            animation: skyRotate 40s linear infinite;
        }
        @keyframes skyRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 星星 - 可点击 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .star:hover {
            transform: scale(2) !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.5) !important;
        }
        .star.active {
            background: #ffd700;
            box-shadow: 0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.5);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(to right, white, transparent);
            animation: shoot linear infinite;
            opacity: 0;
            transform: rotate(-45deg);
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateX(-500px) translateY(500px) rotate(-45deg); opacity: 0; }
        }

        /* 主文字 */
        .main-text {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            animation: fadeIn 2s ease 0.5s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .days-text {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 300;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            background: linear-gradient(135deg, #fff, #a0d8ef, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hearts {
            margin-top: 20px;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            animation: heartbeat 2s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* 星星日期提示 */
        .star-tooltip {
            position: fixed;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 10px 18px;
            color: #ffd700;
            font-size: 0.95rem;
            pointer-events: none;
            z-index: 1001;
            opacity: 0;
            transform: translate(-50%, -150%);
            transition: opacity 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .star-tooltip.show {
            opacity: 1;
        }
        .star-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(0,0,0,0.8);
        }

        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .music-control:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.6; }

        /* 导航按钮 */
        .nav-btn {
            position: fixed;
            bottom: 30px;
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
            pointer-events: auto;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
            color: white;
        }
        .nav-prev { left: 30px; }
        .nav-next { right: 30px; }

        /* 点击星星的波纹效果 */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,215,0,0.3);
            pointer-events: none;
            animation: rippleAnim 0.6s ease-out forwards;
            z-index: 999;
        }
        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        @media (max-width: 600px) {
            .music-control { width: 45px; height: 45px; top: 15px; right: 15px; }
            .nav-btn { padding: 10px 20px; font-size: 0.85rem; }
            .nav-prev { left: 15px; bottom: 20px; }
            .nav-next { right: 15px; bottom: 20px; }
            .days-text { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <!-- 音乐控制 -->
    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>

    <!-- 网易云iframe播放器 - 夜空中最亮的星 -->
    <iframe id="neteasePlayer" frameborder="no" border="0" marginwidth="0" marginheight="0" width="0" height="0" src="//music.163.com/outchain/player?type=2&id=25706282&auto=1&height=0"></iframe>

    <!-- 星空 -->
    <div class="star-sky" id="starSky"></div>

    <!-- 星星日期提示 -->
    <div class="star-tooltip" id="starTooltip"></div>

    <!-- 主文字 -->
    <div class="main-text">
        <div class="days-text" id="daysText">亚克力与可达鸭</div>
        <div class="hearts">🦆 ✨</div>
    </div>

    <!-- 导航 -->
    <a href="target.html" class="nav-btn nav-prev">← 表白</a>
    <a href="heart_popups.html" class="nav-btn nav-next">首页 →</a>

    <script>
        // 音乐控制
        const musicBtn = document.getElementById('musicBtn');
        const neteasePlayer = document.getElementById('neteasePlayer');
        let musicStarted = false;
        let isPaused = false;

        function toggleMusic() {
            if (!musicStarted) {
                neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=25706282&auto=1&height=66';
                musicStarted = true;
                isPaused = false;
                musicBtn.classList.remove('paused');
            } else {
                isPaused = !isPaused;
                neteasePlayer.src = isPaused
                    ? '//music.163.com/outchain/player?type=2&id=25706282&auto=0&height=0'
                    : '//music.163.com/outchain/player?type=2&id=25706282&auto=1&height=66';
                musicBtn.classList.toggle('paused', isPaused);
            }
        }

        // 首次点击页面开启音乐
        document.addEventListener('click', function initMusic(e) {
            if (!musicStarted && !e.target.classList.contains('star')) {
                neteasePlayer.src = '//music.163.com/outchain/player?type=2&id=25706282&auto=1&height=66';
                musicStarted = true;
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // 计算日期范围：2026-01-14 到 今天
        const startDate = new Date('2026-01-14');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        // 计算天数差
        const dayDiff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
        const daysCount = Math.max(1, dayDiff); // 至少1天

        // 生成日期数组
        const dateNames = [];
        for (let i = 0; i < daysCount; i++) {
            const d = new Date(startDate);
            d.setDate(d.getDate() + i);
            const month = d.getMonth() + 1;
            const day = d.getDate();
            dateNames.push(`${month}月${day}日`);
        }

        // 显示总天数
        document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + daysCount + '天';

        // 生成星星
        const starSky = document.getElementById('starSky');
        const tooltip = document.getElementById('starTooltip');
        const stars = [];

        for (let i = 0; i < daysCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.dataset.date = dateNames[i];
            star.dataset.index = i;
            
            const size = Math.random() * 2.5 + 1;
            // 随机分布在旋转的星空中
            const angle = (i / daysCount) * Math.PI * 2 + Math.random() * 0.5;
            const radius = 20 + Math.random() * 60; // 距离中心的百分比
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            
            const dur = Math.random() * 2 + 1.5;
            const delay = Math.random() * 3;
            
            star.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${x}%;
                top: ${y}%;
                --dur: ${dur}s;
                animation-delay: ${delay}s;
                box-shadow: 0 0 ${size * 2}px rgba(255,255,255,0.8);
            `;
            
            // 点击事件
            star.addEventListener('click', function(e) {
                e.stopPropagation();
                
                // 高亮效果
                stars.forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                
                // 显示提示
                tooltip.textContent = '✨ ' + this.dataset.date;
                tooltip.style.left = e.clientX + 'px';
                tooltip.style.top = e.clientY + 'px';
                tooltip.classList.add('show');
                
                // 波纹效果
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = '20px';
                ripple.style.left = (e.clientX - 10) + 'px';
                ripple.style.top = (e.clientY - 10) + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                
                // 3秒后隐藏提示
                setTimeout(() => {
                    tooltip.classList.remove('show');
                    this.classList.remove('active');
                }, 3000);
            });
            
            starSky.appendChild(star);
            stars.push(star);
        }

        // 流星
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            const startX = 30 + Math.random() * 50;
            const startY = Math.random() * 40;
            star.style.cssText = `
                left: ${startX}%;
                top: ${startY}%;
                animation-duration: ${0.8 + Math.random() * 0.6}s;
            `;
            starSky.appendChild(star);
            setTimeout(() => star.remove(), 2000);
        }
        
        // 定期生成流星
        setInterval(createShootingStar, 3000 + Math.random() * 4000);
        for (let i = 0; i < 3; i++) {
            setTimeout(createShootingStar, i * 2000 + Math.random() * 2000);
        }
    </script>
</body>
</html>
