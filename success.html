<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a0533 40%, #2d0a50 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            animation: musicPulse 2s ease-in-out infinite;
        }
        .music-control:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }
        .music-control.paused {
            animation: none;
            opacity: 0.6;
        }
        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,107,157,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,107,157,0.9), 0 0 40px rgba(255,107,157,0.5); }
        }
        .music-control::before {
            content: '🎵';
        }
        .music-control.paused::before {
            content: '🔇';
        }

        /* 星空 */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.5); }
        }

        /* 主体 */
        .main {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 头像 */
        .avatar-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d, #c44569, #8e24aa);
            padding: 5px;
            margin: 0 auto 30px;
            animation: ringPulse 3s ease-in-out infinite, fadeInDown 1s ease 0.3s both;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,107,157,0.5); }
            50%      { box-shadow: 0 0 60px rgba(255,107,157,1), 0 0 100px rgba(196,69,105,0.5); }
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, fadeInUp 1s ease 0.6s both;
            margin-bottom: 10px;
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.9s both;
        }

        /* 照片墙 */
        .photo-wall {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 1.1s both;
        }
        .photo-item {
            width: 90px;
            height: 90px;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid rgba(255,255,255,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }
        .photo-item:hover {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 10px 30px rgba(255,107,157,0.4);
        }

        /* 爱心计数器 */
        .love-counter {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 1.3s both;
        }
        .counter-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 18px 28px;
            text-align: center;
            min-width: 100px;
        }
        .counter-num {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9ec4, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .counter-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* 情话轮播 */
        .quotes {
            max-width: 480px;
            margin: 0 auto 40px;
            padding: 25px 30px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            position: relative;
            animation: fadeInUp 1s ease 1.5s both;
        }
        .quotes::before {
            content: '"';
            position: absolute;
            top: -15px;
            left: 25px;
            font-size: 4rem;
            color: rgba(255,107,157,0.3);
            font-family: serif;
        }
        .quote-text {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.85);
            line-height: 1.8;
            font-style: italic;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 1.7s both;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            box-shadow: 0 4px 20px rgba(255,107,157,0.4);
        }
        .btn-primary:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 8px 35px rgba(255,107,157,0.6);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.18);
            transform: scale(1.05);
        }

        /* 底部 */
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            animation: fadeIn 2s ease 2s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* 爱心上浮 */
        .float-heart {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            animation: floatHeart linear forwards;
            z-index: 5;
        }
        @keyframes floatHeart {
            0%   { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80vh) scale(0.3); opacity: 0; }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem !important; }
            .subtitle { font-size: 0.95rem !important; }
            .photo-wall { gap: 10px; }
            .photo-item { width: 65px; height: 65px; font-size: 1.8rem; }
            .love-counter { gap: 10px; }
            .counter-item { padding: 12px 16px; min-width: 80px; }
            .counter-num { font-size: 1.5rem; }
            .quotes { margin: 0 10px 30px; padding: 18px 20px; }
            .quote-text { font-size: 0.95rem; }
            .btn-row { gap: 10px; }
            .btn { padding: 12px 22px; font-size: 0.95rem; }
            .music-control { width: 45px; height: 45px; font-size: 1.3rem; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <!-- 音乐控制 -->
    <button class="music-control" id="musicBtn" onclick="toggleMusic()" title="点击开关音乐"></button>

    <!-- 背景音乐：飞轮海/田馥甄 - 只对你有感觉 -->
    <audio id="bgMusic" loop>
        <source src="https://music.163.com/song/media/outer/url?id=5252398.mp3" type="audio/mpeg">
    </audio>

    <div class="main">
        <div class="avatar-ring">
            <div class="avatar">🦆</div>
        </div>

        <h1>我们在一起啦！</h1>
        <p class="subtitle">可达鸭 ❤️ 亚克力 · <span id="subtitleDays">90</span> 天</p>

        <div class="photo-wall">
            <div class="photo-item">🦆</div>
            <div class="photo-item">💖</div>
            <div class="photo-item">🌙</div>
            <div class="photo-item">🌸</div>
            <div class="photo-item">💕</div>
            <div class="photo-item">✨</div>
        </div>

        <div class="love-counter">
            <div class="counter-item">
                <div class="counter-num" id="days">0</div>
                <div class="counter-label">在一起天数</div>
            </div>
            <div class="counter-item">
                <div class="counter-num">∞</div>
                <div class="counter-label">心跳次数</div>
            </div>
            <div class="counter-item">
                <div class="counter-num">1</div>
                <div class="counter-label">最爱的人</div>
            </div>
        </div>

        <div class="quotes">
            <div class="quote-text" id="quoteText">遇见你，是鸭鸭这辈子最幸运的事 💕</div>
        </div>

        <div class="btn-row">
            <a href="heart_popups.html" class="btn btn-primary">💗 再看一遍故事</a>
            <a href="target.html" class="btn btn-secondary">🦆 可达鸭等你回答</a>
        </div>
    </div>

    <div class="footer">Made with 💖 by 可达鸭</div>

    <script>
        // 音乐控制
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.add('paused');
                isPlaying = false;
            } else {
                music.play().catch(e => {
                    console.log('点击页面任意位置开启音乐');
                });
                musicBtn.classList.remove('paused');
                isPlaying = true;
            }
        }

        // 首次点击页面任意位置尝试播放
        document.addEventListener('click', function initMusic() {
            if (!isPlaying) {
                music.play().then(() => {
                    musicBtn.classList.remove('paused');
                    isPlaying = true;
                }).catch(() => {});
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // 星空
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.cssText = `
                left: ${Math.random() * 100}vw;
                top: ${Math.random() * 100}vh;
                width: ${size}px;
                height: ${size}px;
                animation: twinkle ${Math.random() * 3 + 2}s ease-in-out infinite;
                animation-delay: ${Math.random() * 3}s;
            `;
            document.body.appendChild(star);
        }

        // 天数计算（从2026-01-15到今天，共90天纪念日）
        const startDate = new Date('2026-01-15T00:00:00');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const rawDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
        const daysSince = Math.max(90, rawDays); // 保证最低显示90天

        const daysEl = document.getElementById('days');
        const subtitleDaysEl = document.getElementById('subtitleDays');
        let daysCount = 0;
        const daysInterval = setInterval(() => {
            daysCount++;
            daysEl.textContent = daysCount;
            subtitleDaysEl.textContent = daysCount;
            if (daysCount >= daysSince) clearInterval(daysInterval);
        }, 60);

        // 情话
        const quotes = [
            '遇见你，是鸭鸭这辈子最幸运的事 💕',
            '每天醒来第一个想到的人，就是你 🌅',
            '可达鸭会一直一直喜欢你 🦆💗',
            '想和你一起去看海，想和你一起数星星 🌊⭐',
            '喜欢你，不需要理由 🥰',
            '你笑的时候，鸭鸭的心都在跳 💓'
        ];
        let quoteIndex = 0;
        const quoteEl = document.getElementById('quoteText');
        function cycleQuotes() {
            quoteEl.style.opacity = '0';
            quoteEl.style.transform = 'translateY(10px)';
            quoteEl.style.transition = 'all 0.4s';
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                quoteEl.textContent = quotes[quoteIndex];
                quoteEl.style.opacity = '1';
                quoteEl.style.transform = 'translateY(0)';
            }, 400);
        }
        setInterval(cycleQuotes, 4000);

        // 爱心上浮
        function floatHeart() {
            const heart = document.createElement('div');
            heart.className = 'float-heart';
            const emojis = ['❤️','💗','💕','💖','🦆','✨','🌸','💓'];
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 90 + 5 + 'vw';
            heart.style.bottom = '0px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        setInterval(floatHeart, 500);
        for (let i = 0; i < 8; i++) setTimeout(floatHeart, i * 400);
    </script>
</body>
</html>
