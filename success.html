<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; min-height: 100dvh;
            background: #000005;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(20,10,60,0.7) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(10,20,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15,10,50,0.5) 0%, transparent 50%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: white;
        }

        /* Canvas 星场 */
        canvas#starCanvas { position: fixed; inset: 0; z-index: 1; }

        /* 临时居中萤火虫 DOM（点击后飞行+漂浮动画） */
        .temp-star {
            position: fixed; border-radius: 50%; background: #39ff14;
            pointer-events: none; z-index: 10000;
            transition: left 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                        top 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.8s ease, opacity 0.5s ease;
        }
        .temp-star.centered {
            animation: centerFloat 3s ease-in-out infinite !important;
            z-index: 10000; opacity: 1 !important;
        }
        @keyframes centerFloat {
            0%   { margin-left: 0;    margin-top: 0; }
            20%  { margin-left: 6px;  margin-top: -8px; }
            40%  { margin-left: -7px; margin-top: 5px; }
            60%  { margin-left: 5px;  margin-top: 9px; }
            80%  { margin-left: -5px; margin-top: -6px; }
            100% { margin-left: 0;    margin-top: 0; }
        }
        .star-label {
            position: fixed; background: rgba(10,40,5,0.92); color: #ffd700;
            font-size: clamp(11px, 3vw, 14px); font-weight: bold;
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.5);
            pointer-events: none; z-index: 9999; white-space: nowrap; text-align: center;
            box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 2px 16px rgba(0,0,0,0.5);
            animation: labelPop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes labelPop {
            0%   { opacity: 0; transform: translate(-50%, -140%) scale(0.4); }
            100% { opacity: 1; transform: translate(-50%, -140%) scale(1); }
        }
        .shooting-star {
            position: fixed; height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
            border-radius: 2px; animation: shoot linear forwards; opacity: 0;
            pointer-events: none; z-index: 2;
        }
        @keyframes shoot {
            0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            5%   { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }
        .main-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 500; text-align: center; padding: 20px;
            animation: fadeIn 2s ease 0.5s both; width: auto; max-width: 95vw;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, calc(-50% + 20px)); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
        .days-text {
            font-size: clamp(1.5rem, 5vw, 4rem); font-weight: 200;
            letter-spacing: clamp(2px, 1vw, 8px); line-height: 1.5;
            text-shadow: 0 0 60px rgba(255,255,255,0.5);
            background: linear-gradient(135deg, #ffffff 0%, #ffd700 40%, #fff8dc 60%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: shimmer 4s linear infinite; white-space: nowrap;
        }
        @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .sub-text { margin-top: 14px; font-size: clamp(0.85rem, 2.5vw, 1.1rem); color: rgba(255,255,255,0.45); letter-spacing: 2px; }

        /* 幕布 */
        .curtain {
            position: fixed; inset: 0; z-index: 99999;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #000008 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .curtain.hide { opacity: 0; transform: scale(1.1); pointer-events: none; }
        .curtain-stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .curtain-stars::before, .curtain-stars::after {
            content: ''; position: absolute; width: 3px; height: 3px;
            background: white; border-radius: 50%;
            box-shadow:
                10vw 20vh 0 0 rgba(255,255,255,0.8), 25vw 45vh 0 -1px rgba(255,255,255,0.6),
                40vw 15vh 0 0 rgba(255,255,255,0.7), 55vw 60vh 0 -1px rgba(255,255,255,0.5),
                70vw 30vh 0 0 rgba(255,255,255,0.8), 85vw 70vh 0 -1px rgba(255,255,255,0.6),
                15vw 80vh 0 0 rgba(255,255,255,0.7), 90vw 10vh 0 -1px rgba(255,255,255,0.5),
                5vw 55vh 0 0 rgba(255,255,255,0.6), 95vw 45vh 0 -1px rgba(255,255,255,0.8),
                30vw 5vh 0 0 rgba(255,255,255,0.7), 60vw 85vh 0 -1px rgba(255,255,255,0.6),
                20vw 35vh 0 0 rgba(255,255,255,0.5), 80vw 55vh 0 0 rgba(255,255,255,0.8),
                45vw 75vh 0 0 rgba(255,255,255,0.7);
            animation: curtainTwinkle 3s ease-in-out infinite;
        }
        .curtain-stars::after { animation-delay: 1.5s; }
        @keyframes curtainTwinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .curtain-title {
            font-size: clamp(1.2rem, 4vw, 2rem); color: rgba(255,255,255,0.6);
            letter-spacing: 4px; margin-bottom: 30px; animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .story-btn {
            padding: 20px 56px; font-size: clamp(1.05rem, 3vw, 1.35rem);
            font-family: inherit; font-weight: 500; color: white; letter-spacing: 2px;
            background: linear-gradient(135deg, rgba(255,120,160,0.35), rgba(120,160,255,0.35));
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50px;
            cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
            animation: glow 2.5s ease-in-out infinite;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .story-btn:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(255,255,255,0.3); }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.4); } 50% { box-shadow: 0 0 36px rgba(255,255,255,0.2), 0 8px 40px rgba(0,0,0,0.5); } }

        /* 底部按钮 - 玻璃磨砂 */
        .float-btn {
            position: fixed; width: 52px; height: 52px; border-radius: 50%;
            background: rgba(15, 15, 40, 0.65); border: 1.5px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9); font-size: 22px; cursor: pointer; z-index: 99998;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            display: flex; align-items: center; justify-content: center; line-height: 1;
            padding: 0; outline: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .float-btn:hover {
            background: rgba(25, 25, 60, 0.85); transform: scale(1.12);
            box-shadow: 0 6px 28px rgba(57,255,20,0.15); border-color: rgba(57,255,20,0.4);
        }
        #musicBtn { bottom: 28px; right: 28px; }
        #musicBtn.muted { opacity: 0.55; border-color: rgba(255,255,255,0.2); }
        #uploadBtn { bottom: 28px; left: 28px; }
        #uploadBtn.uploading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #uploadInput { display: none; }
        #timelineBtn { bottom: 88px; right: 28px; }
        #slideshowBtn { bottom: 148px; right: 28px; }

        /* 统计面板 */
        .stats-section { text-align: left; margin-bottom: 16px; }
        .stats-section h4 { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 1px; }
        .stats-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
        .stats-row .val { color: #39ff14; font-weight: bold; }
        .stats-bars { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 12px; color: rgba(255,255,255,0.6); padding: 4px 0; }
        .stats-bars span { white-space: nowrap; }
        .slideshow-progress {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 99999; background: rgba(10,40,5,0.9); color: #39ff14;
            padding: 8px 20px; border-radius: 20px; font-size: 14px;
            border: 1px solid rgba(57,255,20,0.4); pointer-events: none;
        }

        /* 白天主题 */
        body.daytime {
            background: #fdf6e3;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(255,180,100,0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(255,200,150,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,160,80,0.35) 0%, transparent 50%);
            color: #3a2a1a;
        }
        body.daytime .days-text {
            background: linear-gradient(135deg, #d44a00 0%, #ff8c00 50%, #d44a00 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-shadow: none;
        }
        body.daytime .sub-text { color: rgba(90,50,20,0.6); }
        body.daytime .modal-card { background: rgba(255,245,230,0.95); border-color: rgba(0,0,0,0.1); }
        body.daytime .modal-card h3 { color: rgba(60,30,10,0.9); }
        body.daytime .modal-hint { color: rgba(60,30,10,0.5); }
        body.daytime .modal-btn { color: #3a2a1a; border-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.04); }
        body.daytime .modal-btn.primary { background: rgba(255,140,0,0.2); border-color: rgba(255,140,0,0.5); color: #d44a00; }
        body.daytime .float-btn { background: rgba(255,245,230,0.85); border-color: rgba(0,0,0,0.15); color: #3a2a1a; }
        body.daytime .curtain { background: radial-gradient(ellipse at center, #fff8f0 0%, #ffe8d0 100%); }
        body.daytime .curtain-title { color: rgba(100,50,20,0.7); }
        body.daytime .story-btn { color: #3a2a1a; border-color: rgba(0,0,0,0.25); }
        body.daytime .modal-date { color: #3a2a1a; border-color: rgba(0,0,0,0.2); background: rgba(255,255,255,0.7); }
        body.daytime .modal-date::-webkit-calendar-picker-indicator { filter: none; }
        body.daytime .timeline-item-date { color: rgba(60,30,10,0.7); }
        body.daytime .timeline-item.active .timeline-item-date { color: #39ff14; }
        body.daytime .timeline-month-label { color: rgba(60,30,10,0.35); }
        body.daytime .shooting-star { background: linear-gradient(to right, rgba(255,140,0,0.7), transparent); }
        body.daytime .stats-section h4 { color: rgba(60,30,10,0.5); }
        body.daytime .stats-row { color: #3a2a1a; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100000;
            background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
        }
        .modal-card {
            background: rgba(10,15,30,0.95); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 32px 28px;
            max-width: 90vw; width: 360px; text-align: center;
            backdrop-filter: blur(16px); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .modal-card h3 { font-size: 16px; font-weight: normal; color: rgba(255,255,255,0.9); margin-bottom: 20px; letter-spacing: 1px; }
        .modal-date {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
            color: white; font-size: 16px; font-family: inherit;
            outline: none; cursor: pointer; margin-bottom: 20px;
            appearance: none; -webkit-appearance: none;
        }
        .modal-date::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .modal-hint { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
        .modal-btn-row { display: flex; gap: 12px; }
        .modal-btn {
            flex: 1; padding: 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            color: white; font-size: 14px; font-family: inherit;
            cursor: pointer; transition: all 0.2s ease;
        }
        .modal-btn:hover { background: rgba(255,255,255,0.18); }
        .modal-btn.primary { background: rgba(57,255,20,0.25); border-color: rgba(57,255,20,0.5); color: #39ff14; }
        .modal-btn.primary:hover { background: rgba(57,255,20,0.35); }

        /* 照片模态 */
        .photo-modal {
            position: fixed; inset: 0; z-index: 99997;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
        }
        .photo-modal img {
            max-width: 85vw; max-height: 85vh; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
            opacity: 0; transition: opacity 0.8s ease;
        }
        .photo-modal img.visible { opacity: 1; }
        .photo-label {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(10,40,5,0.9); color: #ffd700; padding: 8px 20px;
            border-radius: 20px; font-size: 14px; border: 1px solid rgba(255,215,0,0.4);
        }

        /* 时间轴 */
        .timeline-modal .modal-card {
            width: 92vw; max-width: 480px; max-height: 75vh;
            display: flex; flex-direction: column; padding: 20px 16px;
        }
        .timeline-modal .modal-card h3 { margin-bottom: 12px; }
        .timeline-list {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
        }
        .timeline-list::-webkit-scrollbar { width: 4px; }
        .timeline-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .timeline-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: 10px; cursor: pointer;
            transition: background 0.2s;
        }
        .timeline-item:hover { background: rgba(255,255,255,0.06); }
        .timeline-item.active { background: rgba(57,255,20,0.12); }
        .timeline-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(57,255,20,0.6); box-shadow: 0 0 6px rgba(57,255,20,0.4);
            flex-shrink: 0; transition: all 0.2s;
        }
        .timeline-item.active .timeline-dot {
            width: 14px; height: 14px; background: #39ff14;
            box-shadow: 0 0 12px rgba(57,255,20,0.8);
        }
        .timeline-item-date { font-size: 14px; color: rgba(255,255,255,0.7); flex: 1; }
        .timeline-item.active .timeline-item-date { color: #39ff14; font-weight: bold; }
        .timeline-item-photo { font-size: 16px; opacity: 0.5; }
        .timeline-month-label {
            font-size: 12px; color: rgba(255,255,255,0.3);
            padding: 8px 12px 4px; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" preload="auto"></audio>
    <button id="musicBtn" class="float-btn" title="音乐静音" onclick="toggleMusic()">🔇</button>
    <button id="uploadBtn" class="float-btn" title="上传图片" onclick="document.getElementById('uploadInput').click()">📷</button>
    <input type="file" id="uploadInput" accept="image/*">
    <button id="timelineBtn" class="float-btn" title="时间轴" onclick="showTimeline()">📅</button>
    <button id="slideshowBtn" class="float-btn" title="纪念册" onclick="showStats()">🎬</button>

    <div class="curtain" id="curtain">
        <div class="curtain-stars"></div>
        <div class="curtain-title">✨ 和你在一起总能遇见萤火虫 ✨</div>
        <button class="story-btn" id="storyBtn" onclick="startStory()">开始我们的故事</button>
    </div>

    <canvas id="starCanvas"></canvas>

    <div class="main-text">
        <div class="days-text" id="daysText">加载中...</div>
        <div class="sub-text" id="dateText"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
    <script>
    // ========== 全局配置 ==========
    var SUPABASE_URL = 'https://osdxiibthsytrpnovlik.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHhpaWJ0aHN5dHJwbm92bGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjMzOTEsImV4cCI6MjA5MjQ5OTM5MX0.OLWo36xHhQTGPQk1O9ZWGISIxTjwX5SSolAL2zkHJbc';
    var supabase = null;
    var photoMap = {};
    var pendingFile = null;

    function fmtDateISO(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function fmtDate(d) {
        return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }

    // ========== 时间工具 ==========
    var STAR_START = new Date('2026-01-14T00:00:00+08:00');
    function bjToday() {
        var n = new Date();
        var bj = new Date(n.getTime() + (480 + n.getTimezoneOffset()) * 60000);
        bj.setHours(0,0,0,0);
        return bj;
    }
    var bjNow = bjToday();
    var STAR_MIN = fmtDateISO(STAR_START);
    var STAR_MAX = fmtDateISO(bjNow);

    // ========== Supabase ==========
    var _supabaseRetries = 0;
    var _SUPABASE_MAX_RETRIES = 30;
    function initSupabase() {
        try {
            if (window.supabase && window.supabase.createClient) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
                loadAllPhotos();
            } else if (_supabaseRetries < _SUPABASE_MAX_RETRIES) {
                _supabaseRetries++;
                setTimeout(initSupabase, 100);
            } else {
                console.warn('Supabase CDN 加载超时，照片功能不可用');
            }
        } catch(e) { console.warn('Supabase 初始化失败:', e); }
    }
    setTimeout(initSupabase, 200);

    async function loadAllPhotos() {
        if (!supabase) return;
        try {
            var { data, error } = await supabase.storage.from('photos').list('', { limit: 1000 });
            if (error || !data) return;
            var latestMap = {};
            data.forEach(function(file) {
                var m = file.name.match(/^(\d{4}-\d{2}-\d{2})/);
                if (m) latestMap[m[1]] = file.name;
            });
            for (var d in latestMap) {
                photoMap[d] = SUPABASE_URL + '/storage/v1/object/public/photos/' + latestMap[d];
                (new Image()).src = photoMap[d]; // 预热缓存
            }
        } catch(e) { console.warn('加载照片列表失败:', e); }
    }

    // ========== 音乐 ==========
    var bgMusic = document.getElementById('bgMusic');
    bgMusic.src = 'https://kdyykl.github.io/xin/bgm.mp3';
    bgMusic.loop = true;
    bgMusic.preload = 'auto';

    function toggleMusic() {
        bgMusic.muted = !bgMusic.muted;
        var btn = document.getElementById('musicBtn');
        btn.classList.toggle('muted', bgMusic.muted);
        btn.textContent = bgMusic.muted ? '🔇' : '🔊';
    }

    function startStory() {
        var curtain = document.getElementById('curtain');
        curtain.classList.add('hide');
        bgMusic.play().then(function() {
            var btn = document.getElementById('musicBtn');
            btn.textContent = '🔊'; btn.classList.remove('muted');
        }).catch(function() {
            var btn = document.getElementById('musicBtn');
            btn.textContent = '🔇'; btn.classList.add('muted');
        });
        setTimeout(function() { curtain.remove(); }, 1200);
    }

    // ========== 天数计算 ==========
    var BASE_DATE = new Date('2026-04-16T00:00:00+08:00');
    var BASE_DAYS = 92;

    function calcDays() {
        var bj = bjToday();
        var base = new Date(BASE_DATE); base.setHours(0,0,0,0);
        return BASE_DAYS + Math.floor((bj - base) / 86400000);
    }
    function updateDisplay() {
        document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + calcDays() + '天';
        document.getElementById('dateText').textContent = fmtDate(new Date());
    }
    updateDisplay();
    setInterval(updateDisplay, 60000);

    // ============================================================
    //  ========== Canvas 萤火虫渲染 ==========
    // ============================================================
    var canvas = document.getElementById('starCanvas');
    var ctx = canvas.getContext('2d');

    // --- 预渲染发光纹理 ---
    var glowTex = document.createElement('canvas');

    // --- 手机端也渲染角色（无需预加载完成即可尝试） ---
    var _foxImg = new Image(); _foxImg.src = 'fox.png';
    var _rabbitImg = new Image(); _rabbitImg.src = 'rabbit.png';
    // 如果图片加载慢，首次渲染几帧后它们就会出现
    var _charsDrawn = false;
    _foxImg.onload = function() { _charsDrawn = false; };
    _rabbitImg.onload = function() { _charsDrawn = false; };
    glowTex.width = 64; glowTex.height = 64;
    var gctx = glowTex.getContext('2d');
    var gradient = gctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(57,255,20,1)');
    gradient.addColorStop(0.12, 'rgba(57,255,20,0.9)');
    gradient.addColorStop(0.35, 'rgba(57,255,20,0.3)');
    gradient.addColorStop(0.65, 'rgba(57,255,20,0.06)');
    gradient.addColorStop(1, 'rgba(57,255,20,0)');
    gctx.fillStyle = gradient;
    gctx.fillRect(0, 0, 64, 64);

    // --- Twinkle 关键帧查表（原 CSS @keyframes twinkle） ---
    var TWINKLE_KEYFRAMES = [
        [0,    { opacity: 0.15, scale: 0.6 }],
        [0.15, { opacity: 0.9,  scale: 1.4 }],
        [0.30, { opacity: 0.5,  scale: 1 }],
        [0.50, { opacity: 0.15, scale: 0.5 }],
        [0.65, { opacity: 0.85, scale: 1.3 }],
        [0.80, { opacity: 0.3,  scale: 0.8 }],
        [1,    { opacity: 0.15, scale: 0.6 }]
    ];
    var TWINKLE_FAST_KEYFRAMES = [
        [0,    { opacity: 1,   scale: 1.3 }],
        [0.5,  { opacity: 0.7, scale: 1.6 }],
        [1,    { opacity: 1,   scale: 1.3 }]
    ];

    function interpolateKeyframes(kf, t) {
        for (var i = 0; i < kf.length - 1; i++) {
            if (t <= kf[i+1][0]) {
                var segLen = kf[i+1][0] - kf[i][0];
                var local = segLen > 0 ? (t - kf[i][0]) / segLen : 0;
                var a = kf[i][1], b = kf[i+1][1];
                return {
                    opacity: a.opacity + (b.opacity - a.opacity) * local,
                    scale: a.scale + (b.scale - a.scale) * local
                };
            }
        }
        return kf[kf.length-1][1];
    }

    function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    // --- 生成 fireflies 数组 ---
    var todayIdx = Math.floor((bjNow - STAR_START) / 86400000) + 1;
    var totalStars = todayIdx + 15;
    var fireflies = [];

    function getSafePos() {
        var x, y;
        do {
            x = 3 + Math.random() * 94;
            y = 3 + Math.random() * 94;
        } while (x >= 40 && x <= 60 && y >= 40 && y <= 60);
        return { x: x, y: y };
    }

    for (var i = 0; i < totalStars; i++) {
        var hasDate = i < todayIdx;
        var size = hasDate ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
        var pos = getSafePos();
        var sd = null, dateStr = null, labelText = null;
        if (hasDate) {
            sd = new Date(STAR_START);
            sd.setDate(sd.getDate() + i);
            dateStr = fmtDateISO(sd);
            labelText = fmtDate(sd);
        }
        fireflies.push({
            baseX: pos.x,
            baseY: pos.y,
            size: size,
            twinkleSpeed: Math.random() * 4 + 2.5,
            twinklePhase: Math.random(),
            flySpeed: Math.random() * 12 + 10,
            flyPhase: Math.random(),
            waypoints: [
                { dx: (Math.random()*60-30), dy: (Math.random()*60-30) },
                { dx: (Math.random()*60-30), dy: (Math.random()*60-30) },
                { dx: (Math.random()*60-30), dy: (Math.random()*60-30) }
            ],
            glow: size * 4,
            hasDate: hasDate,
            date: dateStr,
            label: labelText,
            state: 'normal',

    // --- 渲染循环 ---
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    var _resizeTimer = 0;
    window.addEventListener('resize', function() {
        clearTimeout(_resizeTimer);
        _resizeTimer = setTimeout(resizeCanvas, 150);
    });

    function render(timestamp) {
        requestAnimationFrame(render);

        var w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        for (var i = 0; i < fireflies.length; i++) {
            var f = fireflies[i];
            if (!f.visible && f.state !== 'centered') continue;

            var twinkleCycle = ((timestamp / 1000) / f.twinkleSpeed + f.twinklePhase) % 1;
            if (twinkleCycle < 0) twinkleCycle += 1;

            var tw;
            if (f.state === 'highlighted') {
                tw = interpolateKeyframes(TWINKLE_FAST_KEYFRAMES, twinkleCycle);
            } else {
                tw = interpolateKeyframes(TWINKLE_KEYFRAMES, twinkleCycle);
            }

            var opacity = tw.opacity;
            var scale = tw.scale;

            if (f.state === 'dimmed') {
                opacity = 0.08;
                ctx.save();
                ctx.filter = 'grayscale(0.8)';
            }

            var flyCycle = ((timestamp / 1000) / f.flySpeed + f.flyPhase) % 1;
            if (flyCycle < 0) flyCycle += 1;
            var wp = f.waypoints;
            var waypoints = [{dx:0,dy:0}, wp[0], wp[1], wp[2], {dx:0,dy:0}];
            var segIdx = Math.floor(flyCycle * 4);
            if (segIdx >= 4) segIdx = 3;
            var segT = (flyCycle - segIdx * 0.25) / 0.25;
            var easedT = easeInOut(segT);
            var wa = waypoints[segIdx], wb = waypoints[segIdx+1];
            var dx = wa.dx + (wb.dx - wa.dx) * easedT;
            var dy = wa.dy + (wb.dy - wa.dy) * easedT;

            var px = f.baseX / 100 * w + dx;
            var py = f.baseY / 100 * h + dy;

            var glowPixel = f.glow * scale * 3.2;
            var drawSize = Math.max(glowPixel, 4);

            ctx.globalAlpha = opacity;
            ctx.drawImage(glowTex, px - drawSize/2, py - drawSize/2, drawSize, drawSize);

            if (f.state === 'dimmed') {
                ctx.filter = 'none';
                ctx.restore();
            }
            ctx.globalAlpha = 1;
        }

        // --- 底部居中狐狸兔子角色（图片加载完成后持续绘制） ---
        if (_foxImg.complete && _foxImg.naturalWidth > 0 && _rabbitImg.complete && _rabbitImg.naturalWidth > 0) {
            var _charH = Math.min(h * 0.26, 200);
            var _edgeMargin = 4;
            var _foxW = _charH * (_foxImg.naturalWidth / _foxImg.naturalHeight);
            var _rabH = _charH * 0.78;
            var _rabW = _rabH * (_rabbitImg.naturalWidth / _rabbitImg.naturalHeight);
            var _gap = Math.max(w * 0.015, 6);
            var _totalW = _rabW + _gap + _foxW;
            var _startX = (w - _totalW) / 2;
            var _rx = _startX;
            var _fx = _startX + _rabW + _gap;
            var _baseY = h - _charH - _edgeMargin;
            var _ry = h - _rabH - _edgeMargin;
            ctx.globalAlpha = 0.72;
            ctx.drawImage(_rabbitImg, _rx, _ry, _rabW, _rabH);
            ctx.drawImage(_foxImg, _fx, _baseY, _foxW, _charH);
            ctx.globalAlpha = 1;
        }
    }

    requestAnimationFrame(render);

    // --- Canvas 点击检测 ---
    canvas.addEventListener('click', function(e) {
        var rect = canvas.getBoundingClientRect();
        var cx = e.clientX - rect.left;
        var cy = e.clientY - rect.top;

        if (highlightedStarIdx >= 0) clearHighlight();

        var bestIdx = -1, bestDist = Infinity;
        var now = performance.now();
        for (var i = 0; i < fireflies.length; i++) {
            var f = fireflies[i];
            if (!f.hasDate || !f.visible || f.state === 'centered') continue;
            var flyCycle = ((now / 1000) / f.flySpeed + f.flyPhase) % 1;
            if (flyCycle < 0) flyCycle += 1;
            var wp = f.waypoints;
            var wps = [{dx:0,dy:0}, wp[0], wp[1], wp[2], {dx:0,dy:0}];
            var segIdx = Math.floor(flyCycle * 4);
            if (segIdx >= 4) segIdx = 3;
            var segT = (flyCycle - segIdx * 0.25) / 0.25;
            var easedT = easeInOut(segT);
            var wa = wps[segIdx], wb = wps[segIdx+1];
            var dx = wa.dx + (wb.dx - wa.dx) * easedT;
            var dy = wa.dy + (wb.dy - wa.dy) * easedT;

            var px = f.baseX / 100 * canvas.width + dx;
            var py = f.baseY / 100 * canvas.height + dy;
            var dist = Math.hypot(cx - px, cy - py);
            if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        }

        if (bestIdx >= 0 && bestDist < 35) {
            var f = fireflies[bestIdx];
            flyToCenter(bestIdx, f.label, f, new Date(f.date + 'T00:00:00+08:00'));
        }
    });

    // ========== 居中飞行 + 高亮 ==========
    var highlightedStarIdx = -1;

    function clearHighlight() {
        for (var i = 0; i < fireflies.length; i++) {
            if (fireflies[i].state === 'highlighted' || fireflies[i].state === 'dimmed') {
                fireflies[i].state = 'normal';
                fireflies[i].visible = true;
            }
        }
        highlightedStarIdx = -1;
    }

    function highlightFromTimeline(idx) {
        clearHighlight();
        highlightedStarIdx = idx;
        for (var i = 0; i < fireflies.length; i++) {
            fireflies[i].state = 'dimmed';
        }
        fireflies[idx].state = 'highlighted';
        fireflies[idx].visible = true;
        removeModals();
    }

    function flyToCenter(idx, text, firefly, starDate) {
        document.querySelectorAll('.temp-star,.star-label,.photo-modal').forEach(function(el){ el.remove(); });
        for (var i = 0; i < fireflies.length; i++) {
            if (fireflies[i].state === 'centered') {
                fireflies[i].state = 'normal';
                fireflies[i].visible = true;
            }
        }

        firefly.state = 'centered';
        firefly.visible = false;

        var tempStar = document.createElement('div');
        tempStar.className = 'temp-star';
        var starSize = firefly.size * 1.5;
        var glow = firefly.glow;
        tempStar.style.cssText =
            'width:' + starSize + 'px;height:' + starSize + 'px;' +
            'left:' + firefly.baseX + '%;top:' + firefly.baseY + '%;' +
            'box-shadow:0 0 ' + glow + 'px ' + (glow/2) + 'px rgba(57,255,20,0.9);';
        document.body.appendChild(tempStar);

        requestAnimationFrame(function() {
            tempStar.classList.add('centered');
            tempStar.style.left = '50%';
            tempStar.style.top = '50%';
            tempStar.style.transform = 'translate(-50%,-50%)';
            tempStar.style.boxShadow = '0 0 40px 15px rgba(57,255,20,0.9), 0 0 80px 30px rgba(57,255,20,0.4)';
        });

        var label = document.createElement('div');
        label.className = 'star-label';
        label.textContent = '✨ ' + text;
        label.style.left = '50%'; label.style.top = '50%';
        label.style.transform = 'translate(-50%,-180%)';
        document.body.appendChild(label);

        var photoDate = fmtDateISO(starDate);
        var photoUrl = photoMap[photoDate];
        var preloadedImg = photoUrl ? new Image() : null;
        if (preloadedImg) preloadedImg.src = photoUrl;

        setTimeout(function() {
            if (photoUrl) {
                var modal = document.createElement('div');
                modal.className = 'photo-modal';
                var img = preloadedImg || document.createElement('img');
                if (!preloadedImg) img.src = photoUrl;
                img.alt = '回忆';
                var lbl = document.createElement('div');
                lbl.className = 'photo-label';
                lbl.textContent = '📸 ' + text;
                modal.appendChild(img); modal.appendChild(lbl);
                document.body.appendChild(modal);
                requestAnimationFrame(function() { requestAnimationFrame(function() { img.classList.add('visible'); }); });
            }
        }, 2600);

        setTimeout(function() {
            function reset(e) {
                if (e && e.target.closest('.temp-star,.star-label')) return;
                document.removeEventListener('click', reset);
                document.removeEventListener('touchend', reset);
                label.style.transition = 'opacity 0.4s'; label.style.opacity = '0';
                setTimeout(function(){ label.remove(); }, 400);
                var m = document.querySelector('.photo-modal');
                if (m) { var im = m.querySelector('img'); if (im) im.classList.remove('visible'); setTimeout(function(){ m.remove(); }, 500); }
                tempStar.style.transition = 'opacity 0.5s'; tempStar.style.opacity = '0';
                setTimeout(function(){ tempStar.remove(); }, 500);
                firefly.state = 'normal';
                firefly.visible = true;
            }
            document.addEventListener('click', reset);
            document.addEventListener('touchend', reset);
        }, 200);
    }

    async function doUpload(dateStr) {
        if (!pendingFile) return;
        var uploadBtn = document.getElementById('uploadBtn');
        uploadBtn.textContent = '⏳'; uploadBtn.classList.add('uploading');
        var ext = pendingFile.name.split('.').pop().toLowerCase();
        var fileName = dateStr + '_' + Date.now() + '.' + ext;
        try {
            if (!supabase) throw new Error('supabase not ready');
            var { error } = await supabase.storage.from('photos').upload(fileName, pendingFile);
            if (error) throw error;
            photoMap[dateStr] = SUPABASE_URL + '/storage/v1/object/public/photos/' + fileName;
            (new Image()).src = photoMap[dateStr];
            uploadBtn.textContent = '✅';
            setTimeout(function() { uploadBtn.textContent = '📷'; }, 2000);
            setTimeout(loadAllPhotos, 500);
        } catch(err) {
            console.error('Upload error:', err);
            alert('上传失败: ' + (err.message || JSON.stringify(err)));
            uploadBtn.textContent = '📷';
        }
        uploadBtn.classList.remove('uploading');
        pendingFile = null;
    }

        overlay.appendChild(card);
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) removeModals(); });
    }

    function startSlideshow() {
        stopSlideshow();
        var photosByDate = getPhotosByDate();
        if (photosByDate.length === 0) return;
        _slideshowIdx = 0;

        function playNext() {
            if (_slideshowIdx >= photosByDate.length) {
                stopSlideshow();
                var done = document.createElement('div');
                done.className = 'slideshow-progress';
                done.textContent = '🎬 已播完全部 ' + photosByDate.length + ' 张照片';
                done.id = 'slideshowDone';
                document.body.appendChild(done);
                setTimeout(function() { var d = document.getElementById('slideshowDone'); if (d) d.remove(); }, 4000);
                return;
            }
            var dateStr = photosByDate[_slideshowIdx];
            var ffIdx = -1;
            for (var i = 0; i < fireflies.length; i++) {
                if (fireflies[i].date === dateStr) { ffIdx = i; break; }
            }
            if (ffIdx >= 0) {
                var f = fireflies[ffIdx];
                var sd = new Date(dateStr + 'T00:00:00+08:00');
                flyToCenter(ffIdx, f.label, f, sd);
            }
            var prog = document.getElementById('slideshowProgress');
            if (!prog) {
                prog = document.createElement('div');
                prog.className = 'slideshow-progress';
                prog.id = 'slideshowProgress';
                document.body.appendChild(prog);
            }
            prog.textContent = '🎬 ' + (_slideshowIdx + 1) + ' / ' + photosByDate.length + ' — ' + photosByDate[_slideshowIdx];
            _slideshowIdx++;
        }

        function playNext() {
            if (_slideshowIdx >= photosByDate.length) {
                stopSlideshow();
                var done = document.createElement('div');
                done.className = 'slideshow-progress';
                done.textContent = '🎬 已播完全部 ' + photosByDate.length + ' 张照片';
                done.id = 'slideshowDone';
                document.body.appendChild(done);
                setTimeout(function() { var d = document.getElementById('slideshowDone'); if (d) d.remove(); }, 4000);
                return;
            }
            var dateStr = photosByDate[_slideshowIdx];
            var ffIdx = -1;
            for (var i = 0; i < fireflies.length; i++) {
                if (fireflies[i].date === dateStr) { ffIdx = i; break; }
            }
            if (ffIdx >= 0) {
                var f = fireflies[ffIdx];
                var sd = new Date(dateStr + 'T00:00:00+08:00');
                flyToCenter(ffIdx, f.label, f, sd);
            }
            var prog = document.getElementById('slideshowProgress');
            if (!prog) {
                prog = document.createElement('div');
                prog.className = 'slideshow-progress';
                prog.id = 'slideshowProgress';
                document.body.appendChild(prog);
            }
            prog.textContent = '🎬 ' + (_slideshowIdx + 1) + ' / ' + photosByDate.length + ' — ' + photosByDate[_slideshowIdx];
            _slideshowIdx++;
        }

        function scheduleNext() {
            if (!_slideshowTimer) return;
            // 等当前照片完全加载或最多等 2.5 秒再播下一张
            var photoDate = photosByDate[_slideshowIdx - 1];
            var photoUrl = photoMap[photoDate];
            if (photoUrl) {
                var tester = new Image();
                tester.src = photoUrl;
                var _settled = false;
                function go() { if (!_settled) { _settled = true; scheduleTick(); } }
                tester.onload = go;
                tester.onerror = go;
                setTimeout(go, 2500);
            } else {
                scheduleTick();
            }
        }

        function scheduleTick() {
            if (!_slideshowTimer) return;
            _slideshowTimer = setTimeout(function() {
                document.querySelectorAll('.temp-star,.star-label,.photo-modal').forEach(function(el){ el.remove(); });
                for (var i = 0; i < fireflies.length; i++) {
                    if (fireflies[i].state === 'centered') {
                        fireflies[i].state = 'normal';
                        fireflies[i].visible = true;
                    }
                }
                playNext();
                if (_slideshowTimer) scheduleNext();
            }, 500);
        }

        playNext();
        _slideshowTimer = 1; // 非空标记
        scheduleNext();
    }

    function stopSlideshow() {
        if (_slideshowTimer) { clearTimeout(_slideshowTimer); _slideshowTimer = null; }
        var prog = document.getElementById('slideshowProgress');
        if (prog) prog.remove();
    }

    document.addEventListener('click', function(e) {
        if (_slideshowTimer && !e.target.closest('.temp-star,.star-label,.photo-modal,.modal-overlay,.float-btn')) {
            stopSlideshow();
        }
    });
    </script>
</body>
</html>
