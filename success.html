<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #000005;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(20,10,60,0.7) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(10,20,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15,10,50,0.5) 0%, transparent 50%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: white;
        }
        .star-field {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .star-field .star {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
            z-index: calc(100 + var(--star-idx, 0) % 100);
        }
        .star {
            border-radius: 50%;
            background: #39ff14;
            animation: twinkle var(--dur) ease-in-out infinite,
                       fireflyMove var(--flyDur, 15s) ease-in-out infinite;
            animation-delay: var(--delay), var(--flyDelay, 0s);
            transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                        top 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.8s ease,
                        opacity 0.5s ease;
            will-change: transform;
        }
        .star:hover { filter: brightness(1.8); }
        .star.centered {
            animation: twinkle var(--dur) ease-in-out infinite,
                       centerFloat 3s ease-in-out infinite !important;
            animation-delay: var(--delay), 0s !important;
            z-index: 10000;
        }
        @keyframes centerFloat {
            0%   { margin-left: 0;    margin-top: 0; }
            20%  { margin-left: 6px;  margin-top: -8px; }
            40%  { margin-left: -7px; margin-top: 5px; }
            60%  { margin-left: 5px;  margin-top: 9px; }
            80%  { margin-left: -5px; margin-top: -6px; }
            100% { margin-left: 0;    margin-top: 0; }
        }
        @keyframes twinkle {
            0%   { opacity: 0.15; transform: scale(0.6); }
            15%  { opacity: 0.9;  transform: scale(1.4); }
            30%  { opacity: 0.5;  transform: scale(1); }
            50%  { opacity: 0.15; transform: scale(0.5); }
            65%  { opacity: 0.85; transform: scale(1.3); }
            80%  { opacity: 0.3;  transform: scale(0.8); }
            100% { opacity: 0.15; transform: scale(0.6); }
        }
        @keyframes fireflyMove {
            0%   { margin-left: 0;  margin-top: 0; }
            25%  { margin-left: var(--dx1, 30px); margin-top: var(--dy1, -20px); }
            50%  { margin-left: var(--dx2, -20px); margin-top: var(--dy2, 25px); }
            75%  { margin-left: var(--dx3, 15px); margin-top: var(--dy3, -30px); }
            100% { margin-left: 0; margin-top: 0; }
        }
        .star-label {
            position: fixed;
            background: rgba(10,40,5,0.92);
            color: #ffd700;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.5);
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 2px 16px rgba(0,0,0,0.5);
            animation: labelPop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes labelPop {
            0%   { opacity: 0; transform: translate(-50%, -140%) scale(0.4); }
            100% { opacity: 1; transform: translate(-50%, -140%) scale(1); }
        }
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
            border-radius: 2px;
            animation: shoot linear forwards;
            opacity: 0;
        }
        @keyframes shoot {
            0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            5%   { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }
        .main-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 500;
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease 0.5s both;
            width: auto;
            max-width: 95vw;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, calc(-50% + 20px)); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
        .days-text {
            font-size: clamp(1.4rem, 4.5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: clamp(1px, 0.8vw, 5px);
            line-height: 1.4;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            white-space: nowrap;
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .sub-text {
            margin-top: 14px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
        }
        .hearts {
            margin-top: clamp(20px, 4vh, 40px);
            font-size: clamp(2rem, 6vw, 3.5rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            line-height: 1;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.12); }
        }
        .curtain {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #000008 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .curtain.hide {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        .curtain-stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .curtain-stars::before,
        .curtain-stars::after {
            content: '';
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow:
                10vw 20vh 0 0 rgba(255,255,255,0.8),
                25vw 45vh 0 -1px rgba(255,255,255,0.6),
                40vw 15vh 0 0 rgba(255,255,255,0.7),
                55vw 60vh 0 -1px rgba(255,255,255,0.5),
                70vw 30vh 0 0 rgba(255,255,255,0.8),
                85vw 70vh 0 -1px rgba(255,255,255,0.6),
                15vw 80vh 0 0 rgba(255,255,255,0.7),
                90vw 10vh 0 -1px rgba(255,255,255,0.5),
                5vw 55vh 0 0 rgba(255,255,255,0.6),
                95vw 45vh 0 -1px rgba(255,255,255,0.8),
                30vw 5vh 0 0 rgba(255,255,255,0.7),
                60vw 85vh 0 -1px rgba(255,255,255,0.6),
                20vw 35vh 0 0 rgba(255,255,255,0.5),
                80vw 55vh 0 -1px rgba(255,255,255,0.8),
                45vw 75vh 0 0 rgba(255,255,255,0.7);
            animation: curtainTwinkle 3s ease-in-out infinite;
        }
        .curtain-stars::after { animation-delay: 1.5s; }
        @keyframes curtainTwinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .curtain-title {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: rgba(255,255,255,0.6);
            letter-spacing: 4px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .story-btn {
            padding: 18px 50px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-family: inherit;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, rgba(255,100,150,0.3), rgba(100,150,255,0.3));
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            animation: glow 2s ease-in-out infinite;
        }
        .story-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 30px rgba(255,255,255,0.25); }
        }
        #musicBtn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(10, 10, 30, 0.75);
            border: 1.5px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 99998;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        #musicBtn:hover {
            background: rgba(20, 20, 50, 0.9);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #musicBtn.muted { opacity: 0.55; border-color: rgba(255,255,255,0.2); }
        #uploadBtn {
            position: fixed;
            bottom: 28px;
            left: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(10, 10, 30, 0.75);
            border: 1.5px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 99998;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        #uploadBtn:hover {
            background: rgba(20, 20, 50, 0.9);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #uploadBtn.uploading { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #uploadInput { display: none; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99995;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-card {
            background: rgba(10,15,30,0.95);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 32px 28px;
            max-width: 90vw;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .modal-card h3 {
            font-size: 16px;
            font-weight: normal;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .modal-date {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            margin-bottom: 20px;
            appearance: none;
            -webkit-appearance: none;
        }
        .modal-date::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .modal-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }
        .modal-btn-row { display: flex; gap: 12px; }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modal-btn:hover { background: rgba(255,255,255,0.18); }
        .modal-btn.primary {
            background: rgba(57,255,20,0.25);
            border-color: rgba(57,255,20,0.5);
            color: #39ff14;
        }
        .modal-btn.primary:hover { background: rgba(57,255,20,0.35); }
        .photo-modal {
            position: fixed;
            inset: 0;
            z-index: 99997;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-modal img {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .photo-modal img.visible { opacity: 1; }
        .photo-label {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,40,5,0.9);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255,215,0,0.4);
        }
    </style>
</head>
<body>
    <audio id="bgMusic" preload="auto"></audio>
    <button id="musicBtn" title="音乐静音">🔇</button>
    <button id="uploadBtn" title="上传图片">📷</button>
    <input type="file" id="uploadInput" accept="image/*">

    <div class="curtain" id="curtain">
        <div class="curtain-stars"></div>
        <div class="curtain-title">✨ 和你在一起总能遇见萤火虫 ✨</div>
        <button class="story-btn" id="storyBtn">开始我们的故事</button>
    </div>

    <div class="star-field" id="starField"></div>

    <div class="main-text">
        <div class="days-text" id="daysText">加载中...</div>
        <div class="sub-text" id="dateText"></div>
        <div class="hearts">🦆 ❤️</div>
    </div>

    <script>
    var SUPABASE_URL = 'https://osdxiibthsytrpnovlik.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHhpaWJ0aHN5dHJwbm92bGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjMzOTEsImV4cCI6MjA5MjQ5OTM5MX0.OLWo36xHhQTGPQk1O9ZWGISIxTjwX5SSolAL2zkHJbc';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    var photoMap = {};

    function fmtDateISO(d) {
        return d.getFullYear() + '-' +
               String(d.getMonth()+1).padStart(2,'0') + '-' +
               String(d.getDate()).padStart(2,'0');
    }
    function fmtDate(d) {
        return d.getFullYear() + '.' +
               String(d.getMonth()+1).padStart(2,'0') + '.' +
               String(d.getDate()).padStart(2,'0');
    }

    var STAR_START = new Date('2026-01-14T00:00:00+08:00');
    var now = new Date();
    var bjNow = new Date(now.getTime() + (480 + now.getTimezoneOffset()) * 60000);
    bjNow.setHours(0,0,0,0);
    var STAR_MIN = fmtDateISO(STAR_START);
    var STAR_MAX = fmtDateISO(bjNow);

    async function loadAllPhotos() {
        try {
            var { data, error } = await supabase.storage.from('photos').list('', { limit: 1000 });
            if (error || !data) return;
            data.forEach(function(file) {
                var datePart = file.name.replace(/\.[^.]+$/, '');
                if (/^\d{4}-\d{2}-\d{2}$/.test(datePart)) {
                    photoMap[datePart] = SUPABASE_URL + '/storage/v1/object/public/photos/' + file.name;
                }
            });
        } catch(e) { console.log('加载照片列表失败:', e); }
    }
    loadAllPhotos();

    function removeModals() {
        document.querySelectorAll('.modal-overlay').forEach(function(el){ el.remove(); });
    }

    // 先选照片，再选日期
    var pendingFile = null;

    function showDateModal() {
        removeModals();
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML =
            '<div class="modal-card">' +
                '<h3>选择萤火虫日期</h3>' +
                '<input type="date" class="modal-date" id="datePicker" min="' + STAR_MIN + '" max="' + STAR_MAX + '" value="' + fmtDateISO(bjNow) + '">' +
                '<p class="modal-hint">萤火虫从 ' + STAR_START.getFullYear() + ' 年 ' + (STAR_START.getMonth()+1) + ' 月 ' + STAR_START.getDate() + ' 日开始，每天一只</p>' +
                '<div class="modal-btn-row">' +
                    '<button class="modal-btn" id="dateCancel">取消</button>' +
                    '<button class="modal-btn primary" id="dateConfirm">确认上传</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);
        document.getElementById('dateCancel').onclick = function() {
            removeModals();
            pendingFile = null;
        };
        document.getElementById('dateConfirm').onclick = function() {
            var selectedDate = document.getElementById('datePicker').value;
            if (!selectedDate) return;
            removeModals();
            // 如果该日期已有照片，弹确认
            if (photoMap[selectedDate]) {
                showConfirmModal(selectedDate);
            } else {
                doUpload(selectedDate);
            }
        };
        overlay.addEventListener('click', function(e) { if (e.target === overlay) { removeModals(); pendingFile = null; } });
    }

    function showConfirmModal(selectedDate) {
        removeModals();
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML =
            '<div class="modal-card">' +
                '<h3>' + selectedDate + ' 已有照片</h3>' +
                '<p class="modal-hint" style="color:#ff9f43;margin-bottom:20px;">该日期已有一张照片，上传会覆盖它</p>' +
                '<div class="modal-btn-row">' +
                    '<button class="modal-btn" id="confirmCancel">取消</button>' +
                    '<button class="modal-btn primary" id="confirmOverwrite">覆盖上传</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);
        document.getElementById('confirmCancel').onclick = function() { removeModals(); pendingFile = null; };
        document.getElementById('confirmOverwrite').onclick = function() {
            removeModals();
            doUpload(selectedDate);
        };
        overlay.addEventListener('click', function(e) { if (e.target === overlay) { removeModals(); pendingFile = null; } });
    }

    async function doUpload(dateStr) {
        if (!pendingFile) return;
        var uploadBtn = document.getElementById('uploadBtn');
        uploadBtn.textContent = '⏳';
        uploadBtn.classList.add('uploading');

        var ext = pendingFile.name.split('.').pop().toLowerCase();
        var fileName = dateStr + '.' + ext;

        try {
            var { error } = await supabase.storage.from('photos').upload(fileName, pendingFile, { upsert: true });
            if (error) throw error;
            photoMap[dateStr] = SUPABASE_URL + '/storage/v1/object/public/photos/' + fileName;
            uploadBtn.textContent = '✅';
            setTimeout(function() { uploadBtn.textContent = '📷'; }, 2000);
        } catch(err) {
            alert('上传失败: ' + err.message);
            uploadBtn.textContent = '📷';
        }

        uploadBtn.classList.remove('uploading');
        pendingFile = null;
    }

    // 点击上传按钮 → 先选文件
    document.getElementById('uploadBtn').addEventListener('click', function() {
        document.getElementById('uploadInput').click();
    });

    // 选好文件后 → 验证 → 弹出日期选择
    document.getElementById('uploadInput').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;

        if (file.size > 10 * 1024 * 1024) {
            alert('文件不能超过 10MB');
            e.target.value = '';
            return;
        }

        var ext = file.name.split('.').pop().toLowerCase();
        var validExts = ['jpg','jpeg','png','gif','webp'];
        if (validExts.indexOf(ext) === -1) {
            alert('仅支持 jpg / png / gif / webp 格式');
            e.target.value = '';
            return;
        }

        pendingFile = file;
        e.target.value = '';
        showDateModal();
    });

    var bgMusic = document.getElementById('bgMusic');
    var musicBtn = document.getElementById('musicBtn');
    bgMusic.src = 'https://kdyykl.github.io/xin/bgm.mp3';
    bgMusic.loop = true;

    musicBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        bgMusic.muted = !bgMusic.muted;
        musicBtn.classList.toggle('muted', bgMusic.muted);
        musicBtn.textContent = bgMusic.muted ? '🔇' : '🔊';
        musicBtn.title = bgMusic.muted ? '取消静音' : '音乐静音';
    });

    document.getElementById('storyBtn').addEventListener('click', function() {
        var curtain = document.getElementById('curtain');
        curtain.classList.add('hide');
        bgMusic.play().then(function() {
            musicBtn.style.display = 'flex';
            musicBtn.textContent = '🔊';
            musicBtn.classList.remove('muted');
        }).catch(function() {
            musicBtn.style.display = 'flex';
            musicBtn.textContent = '🔇';
            musicBtn.classList.add('muted');
        });
        setTimeout(function() { curtain.remove(); }, 1200);
    });

    var BASE_DATE = new Date('2026-04-16T00:00:00+08:00');
    var BASE_DAYS = 92;

    function calcDays() {
        var now = new Date();
        var bj = new Date(now.getTime() + (480 + now.getTimezoneOffset()) * 60000);
        bj.setHours(0,0,0,0);
        var base = new Date(BASE_DATE);
        base.setHours(0,0,0,0);
        return BASE_DAYS + Math.floor((bj - base) / 86400000);
    }

    function updateDisplay() {
        document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + calcDays() + '天';
        document.getElementById('dateText').textContent = fmtDate(new Date());
    }
    updateDisplay();
    setInterval(updateDisplay, 60000);

    var todayIdx = Math.floor((bjNow - STAR_START) / 86400000) + 1;
    var totalStars = todayIdx + 30;
    var field = document.getElementById('starField');

    for (var i = 0; i < totalStars; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        var hasDate = i < todayIdx;
        var size = hasDate ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
        var x = 3 + Math.random() * 94;
        var y = 3 + Math.random() * 94;
        var dur = (Math.random() * 4 + 2.5).toFixed(1);
        var delay = (Math.random() * 8).toFixed(1);
        var glow = size * 4;
        var flyDur = (Math.random() * 12 + 10).toFixed(1);
        var flyDelay = (Math.random() * 8).toFixed(1);
        var dx1 = (Math.random()*60-30).toFixed(0);
        var dy1 = (Math.random()*60-30).toFixed(0);
        var dx2 = (Math.random()*60-30).toFixed(0);
        var dy2 = (Math.random()*60-30).toFixed(0);
        var dx3 = (Math.random()*60-30).toFixed(0);
        var dy3 = (Math.random()*60-30).toFixed(0);
        var glowColor = hasDate
            ? 'rgba(57,255,20,0.9), 0 0 ' + (glow*2) + 'px rgba(57,255,20,0.5)'
            : 'rgba(57,255,20,0.7), 0 0 ' + (glow*2) + 'px rgba(57,255,20,0.3)';

        star.style.cssText =
            'width:' + size + 'px;height:' + size + 'px;' +
            'left:' + x.toFixed(2) + '%;top:' + y.toFixed(2) + '%;' +
            '--dur:' + dur + 's;--delay:' + delay + 's;' +
            '--flyDur:' + flyDur + 's;--flyDelay:' + flyDelay + 's;' +
            '--dx1:' + dx1 + 'px;--dy1:' + dy1 + 'px;' +
            '--dx2:' + dx2 + 'px;--dy2:' + dy2 + 'px;' +
            '--dx3:' + dx3 + 'px;--dy3:' + dy3 + 'px;' +
            'box-shadow:0 0 ' + glow + 'px ' + (glow/2) + 'px ' + glowColor + ';';

        if (hasDate) {
            var sd = new Date(STAR_START);
            sd.setDate(sd.getDate() + i);
            var labelText = fmtDate(sd);
            star.addEventListener('click', (function(lt, el, d) {
                return function(e) {
                    e.stopPropagation();
                    flyToCenter(lt, el, d);
                };
            })(labelText, star, sd));
        }
        field.appendChild(star);
    }

    function flyToCenter(text, starEl, starDate) {
        document.querySelectorAll('.star-label').forEach(function(el){ el.remove(); });
        document.querySelectorAll('.star.centered').forEach(function(el){
            el.classList.remove('centered');
            el.style.transform = '';
            el.style.left = el._origLeft;
            el.style.top  = el._origTop;
            el.style.boxShadow = '';
        });
        document.querySelectorAll('.photo-modal').forEach(function(el){ el.remove(); });

        starEl._origLeft = starEl.style.left;
        starEl._origTop  = starEl.style.top;
        starEl.classList.add('centered');
        starEl.style.left = '50%';
        starEl.style.top  = '50%';
        starEl.style.boxShadow = '0 0 40px 15px rgba(57,255,20,0.9), 0 0 80px 30px rgba(57,255,20,0.4)';

        var label = document.createElement('div');
        label.className = 'star-label';
        label.textContent = '✨ ' + text;
        label.style.left = '50%';
        label.style.top  = '50%';
        label.style.transform = 'translate(-50%,-180%)';
        document.body.appendChild(label);

        // 等萤火虫飞到中间后（1.2s），慢慢显示照片
        var photoDate = fmtDateISO(starDate);
        var photoUrl = photoMap[photoDate];
        if (photoUrl) {
            setTimeout(function() {
                var modal = document.createElement('div');
                modal.className = 'photo-modal';
                var img = document.createElement('img');
                img.src = photoUrl;
                img.alt = '回忆';
                var lbl = document.createElement('div');
                lbl.className = 'photo-label';
                lbl.textContent = '📸 ' + text;
                modal.appendChild(img);
                modal.appendChild(lbl);
                document.body.appendChild(modal);
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        img.classList.add('visible');
                    });
                });
            }, 1300);
        }

        setTimeout(function() {
            function reset(e) {
                if (e && e.target.closest('.star')) return;
                document.removeEventListener('click', reset);
                label.style.transition = 'opacity 0.4s';
                label.style.opacity = '0';
                setTimeout(function(){ label.remove(); }, 400);
                var m = document.querySelector('.photo-modal');
                if (m) {
                    var im = m.querySelector('img');
                    if (im) im.classList.remove('visible');
                    setTimeout(function(){ m.remove(); }, 500);
                }
                starEl.classList.remove('centered');
                starEl.style.transform = '';
                starEl.style.left = starEl._origLeft;
                starEl.style.top  = starEl._origTop;
                starEl.style.boxShadow = '';
            }
            document.addEventListener('click', reset);
        }, 200);
    }

    (function spawnStar() {
        var s = document.createElement('div');
        s.className = 'shooting-star';
        s.style.cssText =
            'left:' + (20+Math.random()*60) + '%;' +
            'top:'  + (5+Math.random()*45)  + '%;' +
            'width:' + (100+Math.random()*150) + 'px;' +
            'animation-duration:' + (0.7+Math.random()*0.6) + 's;';
        field.appendChild(s);
        setTimeout(function(){ s.remove(); }, 2000);
        setTimeout(spawnStar, 6000 + Math.random() * 12000);
    })();
    for (var j = 0; j < 4; j++) {
        setTimeout(spawnStar, j * 5000 + Math.random() * 3000);
    }
    </script>
</body>
</html>
